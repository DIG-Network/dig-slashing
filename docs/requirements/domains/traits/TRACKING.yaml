domain_id: traits
normative: NORMATIVE.md
verification: VERIFICATION.md

items:
  - id: DSL-131
    section: "ValidatorView + ValidatorEntry"
    summary: "ValidatorEntry::slash_absolute saturation"
    status: verified
    spec_ref: "docs/requirements/domains/traits/specs/DSL-131.md"
    catalogue_ref: "docs/resources/SPEC.md#dsl-131"
    tests:
      - dsl_131_validator_entry_slash_absolute_saturation_test
    notes: "Opens Phase 9 External-State Traits. dig-slashing doesn't own validator storage; embedders implement ValidatorEntry. DSL-131 pins contract via reference MockValidator in test. Saturation is load-bearing — DSL-022 base-slash + DSL-030 correlation can exceed remaining stake on partially-slashed validators. 5-test suite: under-stake exact, at-stake zeroes, over-stake saturates (incl u64::MAX vs 1 mojo), status+epoch flip on zero-amount slash (DSL-162 compat), repeated debits compose with epoch tracking latest call."

  - id: DSL-132
    section: "ValidatorView + ValidatorEntry"
    summary: "ValidatorEntry::credit_stake"
    status: verified
    spec_ref: "docs/requirements/domains/traits/specs/DSL-132.md"
    catalogue_ref: "docs/resources/SPEC.md#dsl-132"
    tests:
      - dsl_132_validator_entry_credit_stake_test
    notes: "Pins credit_stake via reference MockValidator. Saturating add with TRUE-delta return (on overflow returns actual delta, not requested amount) so callers reconciling pre/post balance see consistent math. Consumers: DSL-064 sustained-appeal revert + DSL-129 reorg rewind. 4-test suite: zero-stake credit, slash/credit roundtrip inverse, saturation at u64::MAX with follow-up no-op, zero-amount no-op."

  - id: DSL-133
    section: "ValidatorView + ValidatorEntry"
    summary: "ValidatorEntry::restore_status"
    status: verified
    spec_ref: "docs/requirements/domains/traits/specs/DSL-133.md"
    catalogue_ref: "docs/resources/SPEC.md#dsl-133"
    tests:
      - dsl_133_validator_entry_restore_status_test
    notes: "Pins restore_status via reference MockValidator. Returns true iff state actually flipped (Slashed→Active); false on no-op. Consumers DSL-066 + DSL-129 may both call on already-restored validator — idempotence matters. 4-test suite: slashed→active + is_slashed flip, never-slashed no-op, repeated restore (first true, subsequent false), re-slash after restore still takes effect (prevents Active-latching bug)."

  - id: DSL-134
    section: "ValidatorView + ValidatorEntry"
    summary: "ValidatorEntry::is_active_at_epoch boundary"
    status: verified
    spec_ref: "docs/requirements/domains/traits/specs/DSL-134.md"
    catalogue_ref: "docs/resources/SPEC.md#dsl-134"
    tests:
      - dsl_134_validator_entry_is_active_boundary_test
    notes: "Pins `activation_epoch <= e < exit_epoch` boundary via reference MockValidator. Left-inclusive, right-exclusive matches Ethereum lifecycle. Consumers: DSL-013/018 verifier active-check + DSL-039 ValidatorNotActiveAtEpoch ground. 6-test suite covers both boundaries + interior + exit=u64::MAX edge."

  - id: DSL-135
    section: "ValidatorView + ValidatorEntry"
    summary: "ValidatorEntry::schedule_exit"
    status: verified
    spec_ref: "docs/requirements/domains/traits/specs/DSL-135.md"
    catalogue_ref: "docs/resources/SPEC.md#dsl-135"
    tests:
      - dsl_135_validator_entry_schedule_exit_test
    notes: "Pins schedule_exit unconditional-overwrite semantics via reference MockValidator. Last call wins including backwards moves (DSL-064/066 sustained-appeal revert rewinds lock to u64::MAX). Downstream is_active_at_epoch observes the new exit epoch right away. 4-test suite: persists epoch, last-wins across multiple calls, is_active_at_epoch propagates, backward + u64::MAX rewinds."

  - id: DSL-136
    section: "ValidatorView + ValidatorEntry"
    summary: "ValidatorView::get / get_mut"
    status: verified
    spec_ref: "docs/requirements/domains/traits/specs/DSL-136.md"
    catalogue_ref: "docs/resources/SPEC.md#dsl-136"
    tests:
      - dsl_136_validator_view_get_contract_test
    notes: "Pins ValidatorView surface via reference MockValidatorSet. Live idx Some, out-of-range (including u32::MAX) None, get_mut + mutation visible via get (no clone), len consistent across [0,1,5,100], empty set all-None (bootstrap scenarios). Every slashing path that reads validator state goes through this trait — buggy Some past len would create phantom validators."

  - id: DSL-137
    section: "EffectiveBalanceView + PublicKeyLookup"
    summary: "EffectiveBalanceView::get / total_active"
    status: verified
    spec_ref: "docs/requirements/domains/traits/specs/DSL-137.md"
    catalogue_ref: "docs/resources/SPEC.md#dsl-137"
    tests:
      - dsl_137_effective_balance_view_test
    notes: "Pins EffectiveBalanceView via reference MockBalances. get(idx) returns balance or 0 (defensive default lets consumers avoid branch-on-missing), total_active() == sum of gets. Consumers: DSL-081 base_reward, DSL-030 correlation, DSL-092 inactivity. 4-test suite: distinct per-validator get, unknown + empty-set → 0 + u32::MAX stress, total_active == manual sum, read-only invariance across repeated calls."

  - id: DSL-138
    section: "EffectiveBalanceView + PublicKeyLookup"
    summary: "PublicKeyLookup::pubkey_of"
    status: verified
    spec_ref: "docs/requirements/domains/traits/specs/DSL-138.md"
    catalogue_ref: "docs/resources/SPEC.md#dsl-138"
    tests:
      - dsl_138_public_key_lookup_test
    notes: "Adds blanket impl<T: ValidatorView + ?Sized> PublicKeyLookup for T in src/traits.rs delegating pubkey_of to ValidatorEntry::public_key. Lets DSL-006/013 verifiers accept a single trait-object pointer for state-read + pubkey-lookup. Existing direct impls (test MapLookup fixtures) continue to work since they don't implement ValidatorView. 3-test suite: key identity via blanket matches direct, unknown + u32::MAX None, `&dyn PublicKeyLookup` accepts &ValidatorView with correct per-seed key identity."

  - id: DSL-139
    section: "CollateralSlasher"
    summary: "CollateralSlasher slash+credit symmetry"
    status: verified
    spec_ref: "docs/requirements/domains/traits/specs/DSL-139.md"
    catalogue_ref: "docs/resources/SPEC.md#dsl-139"
    tests:
      - dsl_139_collateral_slasher_symmetry_test
    notes: "Extends CollateralSlasher trait with `fn slash(idx, amount, epoch) -> Result<(u64, u64), CollateralError>` (signature per SPEC §15.2). DEFAULT impl returns Err(NoCollateral) so existing impl CollateralSlasher fixtures in DSL-065/129/130 tests compile without signature-break. Adds new CollateralError enum (NoCollateral + Disabled variants). Soft-failure contract: NoCollateral at DSL-022 submit_evidence ignored; stake-side slash proceeds. 4-test suite: slash/credit roundtrip via FullCollateral impl, NoCollateral soft-err state-unchanged, double-credit accumulates, default-impl returns NoCollateral verified via CreditOnlyCollateral."

