items:
  - id: DSL-094
    section: "Monotonicity"
    summary: "check_proposal_slot monotonic"
    status: verified
    spec_ref: "docs/requirements/domains/protection/specs/DSL-094.md"
    catalogue_ref: "docs/resources/SPEC.md#dsl-094"
    tests:
      - dsl_094_protection_proposal_monotonic_test
    notes: "Opens Phase 5 Protection. New src/protection.rs with SlashingProtection{last_proposed_slot: u64}. Methods: new(), last_proposed_slot(), check_proposal_slot(slot) returns slot > last_proposed_slot (strict >), record_proposal(slot) sets last_proposed_slot. Derives Default+Serialize+Deserialize for DSL-101 persistence. 4-test suite: default+check(10)→true, record+same→false, record+lower→false, record+higher→true with chained record/check."

  - id: DSL-095
    section: "Monotonicity"
    summary: "check_attestation same-epoch-different-hash fails"
    status: verified
    spec_ref: "docs/requirements/domains/protection/specs/DSL-095.md"
    catalogue_ref: "docs/resources/SPEC.md#dsl-095"
    tests:
      - dsl_095_protection_attestation_same_epoch_different_hash_test
    notes: "Extends SlashingProtection with last_attested_source_epoch: u64, last_attested_target_epoch: u64, last_attested_block_hash: Option<String> (lowercase 0x-hex). check_attestation(source, target, &Bytes32) returns true unless (source,target) equals the stored pair AND the hash differs (or is None). Case-insensitive eq_ignore_ascii_case compare. Ships record_attestation as DSL-097 preview. Inline to_hex_lower helper. 4-test suite: same hash ok, different hash fails, case-insensitive via JSON uppercase roundtrip, None hash fails via JSON Null injection."

  - id: DSL-096
    section: "Monotonicity"
    summary: "would_surround self-check"
    status: verified
    spec_ref: "docs/requirements/domains/protection/specs/DSL-096.md"
    catalogue_ref: "docs/resources/SPEC.md#dsl-096"
    tests:
      - dsl_096_protection_surround_vote_self_check_test
    notes: "Extends check_attestation with pre-branch would_surround guard (private fn) that returns true iff candidate_source < last_attested_source_epoch AND candidate_target > last_attested_target_epoch (both strict). Runs BEFORE DSL-095 same-coord branch so slashable surround short-circuits regardless of stored hash. Mirrors DSL-015 verify-side predicate. 4-test suite: (2,6) vs (3,5) surround rejected, exact match falls through to DSL-095 (same hash ok, different hash rejected), flank (5,7)/(4,10) allowed, same-source-higher-target + lower-source-same-target (non-strict legs) allowed."

