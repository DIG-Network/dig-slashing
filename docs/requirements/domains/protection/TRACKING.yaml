domain_id: protection
normative: NORMATIVE.md
verification: VERIFICATION.md

items:
  - id: DSL-094
    section: "Monotonicity"
    summary: "check_proposal_slot monotonic"
    status: verified
    spec_ref: "docs/requirements/domains/protection/specs/DSL-094.md"
    catalogue_ref: "docs/resources/SPEC.md#dsl-094"
    tests:
      - dsl_094_protection_proposal_monotonic_test
    notes: "Opens Phase 5 Protection. New src/protection.rs with SlashingProtection{last_proposed_slot: u64}. Methods: new(), last_proposed_slot(), check_proposal_slot(slot) returns slot > last_proposed_slot (strict >), record_proposal(slot) sets last_proposed_slot. Derives Default+Serialize+Deserialize for DSL-101 persistence. 4-test suite: default+check(10)→true, record+same→false, record+lower→false, record+higher→true with chained record/check."

  - id: DSL-095
    section: "Monotonicity"
    summary: "check_attestation same-epoch-different-hash fails"
    status: verified
    spec_ref: "docs/requirements/domains/protection/specs/DSL-095.md"
    catalogue_ref: "docs/resources/SPEC.md#dsl-095"
    tests:
      - dsl_095_protection_attestation_same_epoch_different_hash_test
    notes: "Extends SlashingProtection with last_attested_source_epoch: u64, last_attested_target_epoch: u64, last_attested_block_hash: Option<String> (lowercase 0x-hex). check_attestation(source, target, &Bytes32) returns true unless (source,target) equals the stored pair AND the hash differs (or is None). Case-insensitive eq_ignore_ascii_case compare. Ships record_attestation as DSL-097 preview. Inline to_hex_lower helper. 4-test suite: same hash ok, different hash fails, case-insensitive via JSON uppercase roundtrip, None hash fails via JSON Null injection."

  - id: DSL-096
    section: "Monotonicity"
    summary: "would_surround self-check"
    status: verified
    spec_ref: "docs/requirements/domains/protection/specs/DSL-096.md"
    catalogue_ref: "docs/resources/SPEC.md#dsl-096"
    tests:
      - dsl_096_protection_surround_vote_self_check_test
    notes: "Extends check_attestation with pre-branch would_surround guard (private fn) that returns true iff candidate_source < last_attested_source_epoch AND candidate_target > last_attested_target_epoch (both strict). Runs BEFORE DSL-095 same-coord branch so slashable surround short-circuits regardless of stored hash. Mirrors DSL-015 verify-side predicate. 4-test suite: (2,6) vs (3,5) surround rejected, exact match falls through to DSL-095 (same hash ok, different hash rejected), flank (5,7)/(4,10) allowed, same-source-higher-target + lower-source-same-target (non-strict legs) allowed."

  - id: DSL-097
    section: "Recording"
    summary: "record_proposal / record_attestation persist"
    status: verified
    spec_ref: "docs/requirements/domains/protection/specs/DSL-097.md"
    catalogue_ref: "docs/resources/SPEC.md#dsl-097"
    tests:
      - dsl_097_protection_record_persist_test
    notes: "Pins the record contract previewed alongside DSL-094 (proposal) and DSL-095 (attestation). record_proposal overwrites unconditionally (monotonic guard is DSL-094 check_proposal_slot, not the recorder). record_attestation writes all three attested fields atomically in one call — partial writes would desync DSL-095/096 checks. Hash canonicalises to 0x + 64 lowercase hex chars via the to_hex_lower helper; verified against all-0xAB + sequential-byte (0x00..0x1F) fixtures. Save/load survival deferred to DSL-101. 3-test suite."

  - id: DSL-098
    section: "Tip Reconciliation"
    summary: "rewind_attestation_to_epoch clears hash"
    status: verified
    spec_ref: "docs/requirements/domains/protection/specs/DSL-098.md"
    catalogue_ref: "docs/resources/SPEC.md#dsl-098"
    tests:
      - dsl_098_protection_rewind_attestation_clears_hash_test
    notes: "Adds pub fn rewind_attestation_to_epoch(&mut self, new_tip_epoch: u64) to SlashingProtection. Two legs: (a) cap last_attested_source_epoch/last_attested_target_epoch with strict `>` (never raises; == is no-op); (b) clear last_attested_block_hash unconditionally (hash binds to a specific block; reorg invalidates that binding regardless of epoch ordering). Called by DSL-099 reconcile_with_chain_tip + DSL-130 global reorg orchestration. 4-test suite pins: hash cleared below/equal/above tip, both-epochs-capped case, already-lower + mixed + boundary unchanged cases, and post-rewind re-attestation admissibility (the whole point of the operation)."

  - id: DSL-099
    section: "Tip Reconciliation"
    summary: "reconcile_with_chain_tip rewinds both"
    status: verified
    spec_ref: "docs/requirements/domains/protection/specs/DSL-099.md"
    catalogue_ref: "docs/resources/SPEC.md#dsl-099"
    tests:
      - dsl_099_protection_reconcile_with_tip_test
    notes: "Adds pub fn reconcile_with_chain_tip(&mut self, tip_slot: u64, tip_epoch: u64) composing DSL-156 rewind_proposal_to_slot + DSL-098 rewind_attestation_to_epoch. DSL-156 rewind_proposal_to_slot shipped as method preview (strict `>` cap, never raises); DSL-156 dedicated test file lands in Phase 10. Idempotent by construction: both legs are caps. Called on validator boot + DSL-130 global reorg. 4-test suite: both watermarks lowered + hash cleared, PartialEq idempotence across back-to-back calls, surround (4,8)-vs-(5,7) pre-reorg rejected then post-reconcile accepted, already-below-tip state preserved (hash still clears per DSL-098 unconditional leg)."

  - id: DSL-100
    section: "Persistence"
    summary: "Legacy JSON loads with hash=None"
    status: verified
    spec_ref: "docs/requirements/domains/protection/specs/DSL-100.md"
    catalogue_ref: "docs/resources/SPEC.md#dsl-100"
    tests:
      - dsl_100_protection_legacy_json_test
    notes: "Adds #[serde(default)] to last_attested_block_hash so legacy on-disk JSON from the pre-hash schema deserialises with the missing field defaulting to None instead of raising `missing field` errors (serde's derived Deserialize otherwise rejects missing Option fields absent this attribute, despite serde_json's tolerant appearance). Preserves monotonic slashing-protection guarantees across upgrades without a schema-migration tool. 3-test suite: raw legacy JSON string deserialises (numeric fields preserved, hash=None); post-record_attestation re-serialisation emits new field, no null left in output; legacy-loaded treats itself as fresh except the documented (0,0)+None edge case where DSL-095 coord-match rejects until validator re-attests at non-zero epochs."

  - id: DSL-101
    section: "Persistence"
    summary: "Save/load roundtrip"
    status: verified
    spec_ref: "docs/requirements/domains/protection/specs/DSL-101.md"
    catalogue_ref: "docs/resources/SPEC.md#dsl-101"
    tests:
      - dsl_101_protection_save_load_roundtrip_test
    notes: "Adds pub fn save(&self, &PathBuf) + pub fn load(&PathBuf) -> std::io::Result<Self>. Moves serde_json from dev-dep to main dep. Format is to_vec_pretty JSON (operator debuggability). load on non-existent path returns Ok(Self::default()) — first-boot convenience. Serde errors wrapped as std::io::Error(InvalidData). 4-test suite with RAII TmpFile cleanup: whole-struct PartialEq roundtrip, raw-bytes hex-format substring check, external-tooling uppercase rewrite + DSL-095 case-insensitive reload compare, missing-path default. Closes Phase 5 Protection."

  - id: DSL-156
    section: "Proposal Rewind"
    summary: "SlashingProtection::rewind_proposal_to_slot"
    status: gap
    spec_ref: "docs/requirements/domains/protection/specs/DSL-156.md"
    catalogue_ref: "docs/resources/SPEC.md#dsl-156"
    tests: []
    notes: ""
