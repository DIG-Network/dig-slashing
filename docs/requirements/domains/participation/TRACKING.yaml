    notes: "Opens Phase 3 Participation. New module src/participation/ with flags.rs. ParticipationFlags(pub u8) + set(flag_index)/has(flag_index) + is_source_timely/is_target_timely/is_head_timely named accessors. Adds constants TIMELY_SOURCE_FLAG_INDEX=0, TIMELY_TARGET_FLAG_INDEX=1, TIMELY_HEAD_FLAG_INDEX=2. 5-test suite: default=0, set(0)→bit 0, other bits untouched (0b0000_0101 after set(0);set(2)), idempotent, accessors match has(index) for all 3 flags."

