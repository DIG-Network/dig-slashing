domain_id: participation
normative: NORMATIVE.md
verification: VERIFICATION.md

items:
  - id: DSL-074
    section: "ParticipationFlags"
    summary: "ParticipationFlags::set / has per bit"
    status: verified
    spec_ref: "docs/requirements/domains/participation/specs/DSL-074.md"
    catalogue_ref: "docs/resources/SPEC.md#dsl-074"
    tests:
      - dsl_074_participation_flags_bits_test
    notes: "Opens Phase 3 Participation. New module src/participation/ with flags.rs. ParticipationFlags(pub u8) + set(flag_index)/has(flag_index) + is_source_timely/is_target_timely/is_head_timely named accessors. Adds constants TIMELY_SOURCE_FLAG_INDEX=0, TIMELY_TARGET_FLAG_INDEX=1, TIMELY_HEAD_FLAG_INDEX=2. 5-test suite: default=0, set(0)→bit 0, other bits untouched (0b0000_0101 after set(0);set(2)), idempotent, accessors match has(index) for all 3 flags."

  - id: DSL-075
    section: "Timeliness Classification"
    summary: "classify_timeliness TIMELY_SOURCE"
    status: verified
    spec_ref: "docs/requirements/domains/participation/specs/DSL-075.md"
    catalogue_ref: "docs/resources/SPEC.md#dsl-075"
    tests:
      - dsl_075_classify_timely_source_test
    notes: "New src/participation/timeliness.rs. classify_timeliness(data, inclusion_slot, source_is_justified, _target, _head) -> ParticipationFlags. Full 5-arg signature pre-wires DSL-076/077 (target + head flags stub now, populated later). delay = inclusion_slot.saturating_sub(data.slot). TIMELY_SOURCE set iff (MIN_ATTESTATION_INCLUSION_DELAY..=TIMELY_SOURCE_MAX_DELAY_SLOTS).contains(&delay) && source_is_justified. Adds constants MIN_ATTESTATION_INCLUSION_DELAY=1 + TIMELY_SOURCE_MAX_DELAY_SLOTS=5. 4-test suite: delay=1 justified set, delay=5 justified set (boundary), delay=6/0 not set, unjustified loop 1..=5 not set."

  - id: DSL-076
    section: "Timeliness Classification"
    summary: "classify_timeliness TIMELY_TARGET"
    status: verified
    spec_ref: "docs/requirements/domains/participation/specs/DSL-076.md"
    catalogue_ref: "docs/resources/SPEC.md#dsl-076"
    tests:
      - dsl_076_classify_timely_target_test
    notes: "Extends classify_timeliness with TIMELY_TARGET branch. Predicate: (MIN_ATTESTATION_INCLUSION_DELAY..=TIMELY_TARGET_MAX_DELAY_SLOTS).contains(&delay) && is_canonical_target. Wider window than TIMELY_SOURCE (1..=32 vs 1..=5). Adds constant TIMELY_TARGET_MAX_DELAY_SLOTS=32 (=SLOTS_PER_EPOCH). 4-test suite: delay=1 canonical set, delay=32 boundary set, delay=33/0 unset, non-canonical loop [1,10,32] unset."

  - id: DSL-077
    section: "Timeliness Classification"
    summary: "classify_timeliness TIMELY_HEAD"
    status: verified
    spec_ref: "docs/requirements/domains/participation/specs/DSL-077.md"
    catalogue_ref: "docs/resources/SPEC.md#dsl-077"
    tests:
      - dsl_077_classify_timely_head_test
    notes: "Closes classify_timeliness. Predicate: delay == MIN_ATTESTATION_INCLUSION_DELAY (strict equality, not range) && is_canonical_head. Strictest window — only inclusion in the very next block credits the head vote. All 3 classify_timeliness flags now populated. 4-test suite: delay=1 canonical set, delay=2 unset, delay=0 unset, non-canonical unset."

  - id: DSL-078
    section: "Tracker"
    summary: "ParticipationTracker::record_attestation sets flags"
    status: verified
    spec_ref: "docs/requirements/domains/participation/specs/DSL-078.md"
    catalogue_ref: "docs/resources/SPEC.md#dsl-078"
    tests:
      - dsl_078_participation_tracker_record_test
    notes: "Opens ParticipationTracker state machine (src/participation/tracker.rs + error.rs). Two-epoch Vec<ParticipationFlags> storage sized at construction. record_attestation(data, attesting_indices, flags) bit-ORs flags.0 into current_epoch[idx] for each index; returns IndexOutOfRange on first offending index (later indices untouched). Does NOT advance current_epoch_number. Accessors: current_flags/previous_flags/validator_count/current_epoch_number. Adds ParticipationError{IndexOutOfRange(u32), NonAscendingIndices} (DSL-079 uses the second variant). 4-test suite: 3-index SOURCE applied + unrelated untouched, SOURCE then TARGET additive + idempotent on repeat, out-of-range error with leading in-range indices, epoch_number unchanged."

  - id: DSL-079
    section: "Tracker"
    summary: "ParticipationTracker rejects non-ascending indices"
    status: verified
    spec_ref: "docs/requirements/domains/participation/specs/DSL-079.md"
    catalogue_ref: "docs/resources/SPEC.md#dsl-079"
    tests:
      - dsl_079_participation_tracker_non_ascending_test
    notes: "Strict-ascending check on attesting_indices via windows(2) loop BEFORE the bit-OR pass. w[0]==w[1] → DuplicateIndex(w[0]); w[0]>w[1] → NonAscendingIndices. Adds ParticipationError::DuplicateIndex(u32) variant (NonAscendingIndices pre-wired in DSL-078 commit). Mirrors IndexedAttestation::validate_structure (DSL-005). No state mutation on error. 4-test suite: [3,2,1] → NonAscendingIndices, [1,1,2] → DuplicateIndex(1), [1] → Ok, [1,2,3] → Ok."

  - id: DSL-080
    section: "Tracker"
    summary: "ParticipationTracker::rotate_epoch"
    status: verified
    spec_ref: "docs/requirements/domains/participation/specs/DSL-080.md"
    catalogue_ref: "docs/resources/SPEC.md#dsl-080"
    tests:
      - dsl_080_participation_tracker_rotate_test
    notes: "rotate_epoch(new_epoch, validator_count): mem::swap(&mut previous, &mut current); current.clear(); current.resize(validator_count, default); current_epoch_number = new_epoch. Drops trailing entries on shrink. Previous-epoch vec keeps its length from the swap; out-of-range previous_flags(idx) → None. Closes ParticipationTracker state machine; DSL-081..086 read previous_flags for reward/penalty math. 4-test suite: swap with per-index snapshots, current zeroed, grow 5→12 + shrink 12→3, epoch_number updates across multiple rotations."

  - id: DSL-081
    section: "Base Reward"
    summary: "base_reward = eff_bal * 64 / isqrt(total_active)"
    status: verified
    spec_ref: "docs/requirements/domains/participation/specs/DSL-081.md"
    catalogue_ref: "docs/resources/SPEC.md#dsl-081"
    tests:
      - dsl_081_base_reward_formula_test
    notes: "New src/participation/rewards.rs. base_reward(effective_balance: u64, total_active_balance: u64) -> u64. Uses stdlib u128::isqrt (stable 1.84+) instead of num_integer::Roots::sqrt per SPEC — avoids crate pull. u128 intermediate for overflow safety. Zero guard on total_active_balance. Saturates at u64::MAX. Adds BASE_REWARD_FACTOR=64 constant. 4-test suite: exact formula match at MIN_EFFECTIVE_BALANCE, doubling total halves reward by sqrt(2) within ±1% bps window [13900, 14200], total=0 → 0, (u64::MAX, …) does not panic."

  - id: DSL-082
    section: "Flag Deltas"
    summary: "compute_flag_deltas awards on hit"
    status: verified
    spec_ref: "docs/requirements/domains/participation/specs/DSL-082.md"
    catalogue_ref: "docs/resources/SPEC.md#dsl-082"
    tests:
      - dsl_082_flag_deltas_reward_on_hit_test
    notes: "Adds FlagDelta{validator_index: u32, reward: u64, penalty: u64} (serde-derived) + compute_flag_deltas(tracker, effective_balances, total_active_balance) -> Vec<FlagDelta>. Iterates 0..tracker.validator_count() in index order; reads previous_flags (empty/default if out-of-range). Reward = sum of per-flag slices base * weight / WEIGHT_DENOMINATOR. Penalty=0 until DSL-083. Adds constants WEIGHT_DENOMINATOR=64, TIMELY_SOURCE_WEIGHT=14, TIMELY_TARGET_WEIGHT=26, TIMELY_HEAD_WEIGHT=14. 4-test suite: each flag alone, all three (sum 54/64)."

  - id: DSL-083
    section: "Flag Deltas"
    summary: "compute_flag_deltas penalises SOURCE/TARGET miss; HEAD miss exempt"
    status: verified
    spec_ref: "docs/requirements/domains/participation/specs/DSL-083.md"
    catalogue_ref: "docs/resources/SPEC.md#dsl-083"
    tests:
      - dsl_083_flag_deltas_penalty_head_exempt_test
    notes: "Extends compute_flag_deltas with penalty branch. Debits base * weight / WEIGHT_DENOMINATOR for SOURCE-miss + TARGET-miss; HEAD-miss is deliberately exempt (timing too network-dependent per Ethereum Altair). 4-test suite: SOURCE miss → 14/64, TARGET miss → 26/64, HEAD miss (SOURCE+TARGET set) → 0, all three miss → 40/64. DSL-082 tests relaxed to not assert penalty (now populated)."

  - id: DSL-084
    section: "Flag Deltas"
    summary: "compute_flag_deltas zeroes rewards in finality stall"
    status: verified
    spec_ref: "docs/requirements/domains/participation/specs/DSL-084.md"
    catalogue_ref: "docs/resources/SPEC.md#dsl-084"
    tests:
      - dsl_084_flag_deltas_stall_zero_rewards_test
    notes: "Adds in_finality_stall: bool arg to compute_flag_deltas signature (breaks prior DSL-082/083 tests — all fixed with false pass-through). When true, post-computed reward is clamped to 0; penalty untouched. Matches Ethereum inactivity-leak: honest attesters stop being paid but missed attestations continue to debit. 3-test suite: all-hit+stall → (0,0), all-miss+stall → (0, base*40/64), all-hit+no-stall → (base*54/64, 0)."

  - id: DSL-085
    section: "Proposer Reward"
    summary: "proposer_inclusion_reward = base * 8 / 56"
    status: verified
    spec_ref: "docs/requirements/domains/participation/specs/DSL-085.md"
    catalogue_ref: "docs/resources/SPEC.md#dsl-085"
    tests:
      - dsl_085_proposer_inclusion_reward_formula_test
    notes: "proposer_inclusion_reward(base: u64) -> u64 = base.saturating_mul(PROPOSER_WEIGHT).saturating_div(WEIGHT_DENOMINATOR - PROPOSER_WEIGHT) = base * 8 / 56. Adds PROPOSER_WEIGHT=8 constant. Saturating arithmetic on extreme inputs. 4-test suite: base=56 → 8, base=0 → 0, base=100 → 14 (floor), base=u64::MAX → u64::MAX/56 (no panic)."

  - id: DSL-086
    section: "Weight Denominator"
    summary: "WEIGHT_DENOMINATOR = 64 with 2 units reserved (no sync committee)"
    status: verified
    spec_ref: "docs/requirements/domains/participation/specs/DSL-086.md"
    catalogue_ref: "docs/resources/SPEC.md#dsl-086"
    tests:
      - dsl_086_weight_denominator_no_sync_test
    notes: "Constants-sanity test. Test-only (no src/ changes — all constants already defined). Asserts WEIGHT_DENOMINATOR=64, TIMELY_SOURCE_WEIGHT+TIMELY_TARGET_WEIGHT+TIMELY_HEAD_WEIGHT+PROPOSER_WEIGHT=62 (14+26+14+8), gap of 2 preserved for unused SYNC_REWARD_WEIGHT slot. Individual weight pins surface any drift in diff. Closes Phase 3 Participation."

  - id: DSL-153
    section: "Reorg"
    summary: "ParticipationTracker::rewind_on_reorg zero-fill restore"
    status: verified
    spec_ref: "docs/requirements/domains/participation/specs/DSL-153.md"
    catalogue_ref: "docs/resources/SPEC.md#dsl-153"
    tests:
      - dsl_153_participation_tracker_rewind_on_reorg_test
    notes: "rewind_on_reorg already shipped as dependency of DSL-130; this cycle adds `if dropped == 0 { return 0; }` short-circuit guard to satisfy DSL-153 depth-0 no-op acceptance (orchestrator occasionally fires rewind_all_on_reorg defensively with new_tip == current). Adopted semantics: zero-fill both epoch vectors (no ring-buffer snapshots retained) — conservative choice shared with InactivityScoreTracker::rewind_on_reorg avoids ghost reward credits from rewound chain. 4-test suite: restores snapshot (post-rewind flags all zero), epoch_number anchors at new_tip (10→7 dropped=3), resize grow (4→7) + shrink (10→3), depth=0 no-op (new_tip==current preserves state + new_tip > current saturates dropped to 0)."

  - id: DSL-154
    section: "Serde"
    summary: "ParticipationFlags serde roundtrip"
    status: gap
    spec_ref: "docs/requirements/domains/participation/specs/DSL-154.md"
    catalogue_ref: "docs/resources/SPEC.md#dsl-154"
    tests: []
    notes: ""
