items:
  - id: DSL-127
    section: "Epoch Boundary"
    summary: "run_epoch_boundary fixed ordering"
    status: verified
    spec_ref: "docs/requirements/domains/orchestration/specs/DSL-127.md"
    catalogue_ref: "docs/resources/SPEC.md#dsl-127"
    tests:
      - dsl_127_epoch_boundary_order_test
    notes: "Opens Phase 8. New src/orchestration.rs module with pub fn run_epoch_boundary + EpochBoundaryReport + JustificationView trait (DSL-143 preview). 8-step pipeline: compute_flag_deltas, update_for_epoch, epoch_penalties, finalise_expired_slashes, rotate_epoch, set_epoch, resize_for (conditional), prune_processed_older_than. Adds SlashingManager::prune_processed_older_than(cutoff) — retains processed entries with epoch >= cutoff AND range-removes slashed_in_window rows below cutoff. Prune cutoff = current.saturating_sub(CORRELATION_WINDOW_EPOCHS) preserves all correlation-relevant data. 5-test suite uses full trait-impl fakes for outcome-based ordering: end-to-end population + counter advances, inactivity update before finalise (stall triggers DSL-089 +4), prune last, validator-count growth triggers resize, justification-driven stall flag."

  - id: DSL-128
    section: "Genesis"
    summary: "SlashingSystem::genesis"
    status: verified
    spec_ref: "docs/requirements/domains/orchestration/specs/DSL-128.md"
    catalogue_ref: "docs/resources/SPEC.md#dsl-128"
    tests:
      - dsl_128_genesis_initialisation_test
    notes: "New src/system.rs with GenesisParameters (genesis_epoch + initial_validator_count + network_id) + SlashingSystem aggregate (manager + participation + inactivity) + genesis constructor. Thin wrapper — each sub-tracker was already independently usable; aggregate gives embedders one struct to snapshot/pass around. 5-test suite: manager processed+book empty, trackers sized to initial_validator_count, all flags + inactivity scores zero, epoch matches params (canonical 0 AND non-zero fork 1_234), in_finality_stall(0,0)==false."

  - id: DSL-129
    section: "Manager Reorg"
    summary: "SlashingManager::rewind_on_reorg"
    status: verified
    spec_ref: "docs/requirements/domains/orchestration/specs/DSL-129.md"
    catalogue_ref: "docs/resources/SPEC.md#dsl-129"
    tests:
      - dsl_129_manager_rewind_on_reorg_test
    notes: "Adds pub fn rewind_on_reorg(new_tip_epoch, &mut dyn ValidatorView, Option<&mut dyn CollateralSlasher>, &mut dyn BondEscrow) -> Vec<Bytes32>. Iterates book.submitted_after(new_tip_epoch), removes each record, per slashable validator: credit_stake + restore_status + CollateralSlasher::credit (when supplied) + slashed_in_window row removal. Reporter bond RELEASED (not forfeited — reorg not reporter's fault; distinguishes from DSL-064 sustained-appeal path). Clears processed map so re-submission on canonical chain admits cleanly. Adds PendingSlashBook::submitted_after helper + SlashingManager::mark_processed / mark_slashed_in_window / is_slashed_in_window pub methods (persistence load + test observability). 6-test suite via FakeValidator + SpyBondEscrow + SpyCollateral spies."

