domain_id: inactivity
normative: NORMATIVE.md
verification: VERIFICATION.md

items:
  - id: DSL-087
    section: "Finality-Stall Detection"
    summary: "in_finality_stall returns true iff current - finalized > MIN_EPOCHS_TO_INACTIVITY_PENALTY (4)"
    status: verified
    spec_ref: "docs/requirements/domains/inactivity/specs/DSL-087.md"
    tests:
      - dsl_087_in_finality_stall_threshold_test
    notes: "Opens Phase 4 Inactivity. New src/inactivity/ module with penalty.rs. in_finality_stall(current, finalized) -> bool uses saturating_sub + strict > comparison against MIN_EPOCHS_TO_INACTIVITY_PENALTY=4. Matches Ethereum process_inactivity_updates. 4-test suite: gap=5 → true, gap=4 → false (boundary), gap=0/1/3 → false, current<finalized → false (no panic)."

  - id: DSL-088
    section: "Score Update"
    summary: "InactivityScoreTracker::update_for_epoch decrements score by 1 (saturating) on target-timely hit"
    status: verified
    spec_ref: "docs/requirements/domains/inactivity/specs/DSL-088.md"
    tests:
      - dsl_088_inactivity_score_hit_decrement_test
    notes: "Adds InactivityScoreTracker (Vec<u64> indexed by validator). Constructor new(validator_count), accessors score/set_score/validator_count. update_for_epoch(participation, in_finality_stall) reads previous_flags, decrements 1 saturating at 0 per TIMELY_TARGET hit. _in_finality_stall pre-wired for DSL-089/090. 3-test suite: hit decrement, zero saturates, stall does not gate decrement."

  - id: DSL-089
    section: "Score Update"
    summary: "InactivityScoreTracker::update_for_epoch increments by INACTIVITY_SCORE_BIAS (4) on target miss during stall"
    status: verified
    spec_ref: "docs/requirements/domains/inactivity/specs/DSL-089.md"
    tests:
      - dsl_089_inactivity_score_miss_in_stall_increment_test
    notes: "Extends update_for_epoch with miss branch: TIMELY_TARGET unset + in_finality_stall=true → saturating_add(INACTIVITY_SCORE_BIAS). Miss + no-stall → unchanged here (DSL-090 global recovery covers). Adds INACTIVITY_SCORE_BIAS=4 constant. 4-test suite: miss+stall → +4 (hit on same epoch still decrements via DSL-088), miss+no-stall → no change, u64::MAX saturates, 10× miss+stall → +40 linear growth."

  - id: DSL-090
    section: "Score Update"
    summary: "Global recovery decrement INACTIVITY_SCORE_RECOVERY_RATE (16) applied to all validators when out of stall"
    status: verified
    spec_ref: "docs/requirements/domains/inactivity/specs/DSL-090.md"
    tests:
      - dsl_090_inactivity_score_out_of_stall_recovery_test
    notes: "Final branch of update_for_epoch. When !in_finality_stall, saturating_sub(INACTIVITY_SCORE_RECOVERY_RATE) on every slot AFTER per-validator hit/miss pass. Adds INACTIVITY_SCORE_RECOVERY_RATE=16 constant. Forced DSL-088 + DSL-089 test fixtures to stall=true (for isolation) or accept saturating behaviour. 3-test suite: 50→34, 10→0 saturates, stall=true → no recovery. Closes InactivityScoreTracker::update_for_epoch."

  - id: DSL-091
    section: "Per-Epoch Penalty"
    summary: "InactivityScoreTracker::epoch_penalties returns empty vec when out of stall"
    status: verified
    spec_ref: "docs/requirements/domains/inactivity/specs/DSL-091.md"
    tests:
      - dsl_091_inactivity_penalty_no_stall_empty_test
    notes: "New epoch_penalties(&dyn EffectiveBalanceView, in_finality_stall: bool) -> Vec<(u32, u64)> method. Short-circuits to empty vec when !in_finality_stall. DSL-092 replaces the in-stall branch (currently also empty) with the formula eff_bal * score / INACTIVITY_PENALTY_QUOTIENT. 2-test suite: mixed scores + no-stall → empty, all-zero + no-stall → empty."

  - id: DSL-092
    section: "Per-Epoch Penalty"
    summary: "Per-epoch penalty formula eff_bal * score / INACTIVITY_PENALTY_QUOTIENT (16_777_216)"
    status: gap
    spec_ref: "docs/requirements/domains/inactivity/specs/DSL-092.md"
    tests:
      - dsl_092_inactivity_penalty_formula_test
    notes: "Integer division; only non-zero penalty tuples returned; zero-score or truncated-to-zero entries omitted."

  - id: DSL-093
    section: "Resize"
    summary: "InactivityScoreTracker::resize_for grows scores vec; new entries start at 0"
    status: gap
    spec_ref: "docs/requirements/domains/inactivity/specs/DSL-093.md"
    tests:
      - dsl_093_inactivity_resize_test
    notes: "Prior entries preserved; idempotent when sizes equal; grow-only for new activations."

  - id: DSL-155
    section: "Reorg"
    summary: "InactivityScoreTracker::rewind_on_reorg ring-buffer restore"
    status: gap
    spec_ref: "docs/requirements/domains/inactivity/specs/DSL-155.md"
    catalogue_ref: "docs/resources/SPEC.md#dsl-155"
    tests: []
    notes: ""
