domain_id: remark
normative: NORMATIVE.md
verification: VERIFICATION.md

items:
  - id: DSL-102
    section: "Evidence Wire"
    summary: "Evidence REMARK wire roundtrip"
    status: verified
    spec_ref: "docs/requirements/domains/remark/specs/DSL-102.md"
    catalogue_ref: "docs/resources/SPEC.md#dsl-102"
    tests:
      - dsl_102_evidence_remark_wire_roundtrip_test
    notes: "Opens Phase 6 REMARK Admission. New src/remark/ module with mod.rs + evidence_wire.rs. Adds SLASH_EVIDENCE_REMARK_MAGIC_V1 (b\"DIG_SLASH_EVIDENCE_V1\\0\") + SLASH_APPEAL_REMARK_MAGIC_V1 (b\"DIG_SLASH_APPEAL_V1\\0\") constants (appeal magic shipped early for DSL-110 reuse). Encoder: MAGIC || serde_json(SlashingEvidence). Parser generic over AsRef<[u8]>, strict prefix compare (magic MUST land at byte 0 to thwart in-middle smuggling), silent-skip on: short-payload, wrong-prefix, malformed-JSON, wrong-schema-JSON. Returns matches in input order so admission layer preserves block-level sequencing. 5-test suite: roundtrip, magic-prefix pin, foreign/empty/short skip, malformed+wrong-schema skip, mixed valid/foreign/valid interleaving preserves order."

  - id: DSL-103
    section: "Evidence Wire"
    summary: "Evidence puzzle_reveal emits one REMARK"
    status: verified
    spec_ref: "docs/requirements/domains/remark/specs/DSL-103.md"
    catalogue_ref: "docs/resources/SPEC.md#dsl-103"
    tests:
      - dsl_103_evidence_puzzle_reveal_emits_one_remark_test
    notes: "Adds pub fn slashing_evidence_remark_puzzle_reveal_v1 + slashing_evidence_remark_puzzle_hash_v1 in src/remark/evidence_wire.rs. Puzzle is a quoted-constant `(q . ((1 payload)))` built via clvmr Allocator (new_small_number for opcode 1, new_atom for payload, new_pair for list construction, serde::node_to_bytes for output). No solution inputs by design — coin-commitment invariant requires the reveal to be byte-identical to what tree-hashed at creation. Hash via clvm_utils::tree_hash_from_bytes(reveal). Errors wrapped as SlashingError::InvalidSlashingEvidence for uniform propagation. 4-test suite runs the puzzle through chia_sdk_types::run_puzzle + ChiaDialect(0): exactly one Condition::Remark, REMARK payload walked via allocator.sexp pair decomposition + DSL-102 parser round-trip equals original evidence, hash deterministic + binds reporter_validator_index mutations, hash equals tree_hash_from_bytes(reveal). Adds clvmr + clvm-utils main deps; chia-sdk-types + clvm-traits dev-deps."

  - id: DSL-104
    section: "Evidence Admission"
    summary: "Admission accepts matching coin"
    status: verified
    spec_ref: "docs/requirements/domains/remark/specs/DSL-104.md"
    catalogue_ref: "docs/resources/SPEC.md#dsl-104"
    tests:
      - dsl_104_evidence_admission_matching_coin_test
    notes: "Adds pub fn enforce_slashing_evidence_remark_admission(&SpendBundle, &HashMap<Bytes32, Vec<Vec<u8>>>) -> Result<(), SlashingError> in new src/remark/policy.rs. For each coin_spend: coin_id → lookup REMARK payloads (unwrap_or empty), parse via DSL-102, for each parsed evidence derive DSL-103 puzzle hash, compare with coin.puzzle_hash. Mismatch raises new SlashingError::AdmissionPuzzleHashMismatch { expected: Bytes32, got: Bytes32 } variant (DSL-105 exercises the fail path). Foreign/malformed payloads silently skip via DSL-102 parser. 4-test suite: single match, two-spend all-match, empty bundle (vacuous Ok), spend absent from conditions map (unwrap_or_default path)."

  - id: DSL-105
    section: "Evidence Admission"
    summary: "Admission rejects mismatched payload"
    status: verified
    spec_ref: "docs/requirements/domains/remark/specs/DSL-105.md"
    catalogue_ref: "docs/resources/SPEC.md#dsl-105"
    tests:
      - dsl_105_evidence_admission_mismatch_rejected_test
    notes: "Exercises the DSL-104 enforce_slashing_evidence_remark_admission fail path. SlashingError::AdmissionPuzzleHashMismatch already defined in DSL-104 commit. 3-test suite: wrong coin.puzzle_hash rejects with correct variant; error fields populated with derived puzzle_hash + coin ph; thiserror Display renders both hashes as 64-char lowercase hex via chia-protocol Bytes32 Display (no explicit hex::encode call needed — Display impl uses hex::encode internally); short-circuit proven by 3-spend bundle where error's `got` matches the FIRST mismatch not the second."

  - id: DSL-106
    section: "Evidence Mempool Policy"
    summary: "Expired rejected"
    status: verified
    spec_ref: "docs/requirements/domains/remark/specs/DSL-106.md"
    catalogue_ref: "docs/resources/SPEC.md#dsl-106"
    tests:
      - dsl_106_evidence_mempool_expired_rejected_test
    notes: "Adds pub fn enforce_slashing_evidence_mempool_policy(&SpendBundle, &HashMap<Bytes32, Vec<Vec<u8>>>, current_epoch: u64) -> Result<(), SlashingError> in src/remark/policy.rs. Predicate `ev.epoch + SLASH_LOOKBACK_EPOCHS < current_epoch` with addition on LHS prevents underflow at genesis/boot. Reuses SlashingError::OffenseTooOld (DSL-011 variant) rather than a separate OutsideLookback — same predicate, unified error surface. 5-test suite: expired rejected with both epochs, boundary (== current-LOOKBACK) strict-< admits, within-window admits, current<=LOOKBACK admits all, multi-spend short-circuits on FIRST expired."

  - id: DSL-107
    section: "Evidence Mempool Policy"
    summary: "Duplicate rejected"
    status: verified
    spec_ref: "docs/requirements/domains/remark/specs/DSL-107.md"
    catalogue_ref: "docs/resources/SPEC.md#dsl-107"
    tests:
      - dsl_107_evidence_mempool_duplicate_rejected_test
    notes: "Adds pub fn enforce_slashing_evidence_mempool_dedup_policy(pending: &[SlashingEvidence], incoming: &[SlashingEvidence]) -> Result<(), SlashingError> + new SlashingError::DuplicateEvidence variant. Fingerprint = serde_json::to_vec(&ev) bytes (reuses DSL-102 wire bytes — no extra hash). HashSet pre-seeded from pending, walk incoming: first collision short-circuits. Upstream of DSL-026 manager AlreadySlashed (which operates on evidence.hash() at manager layer). 4-test suite: pending/incoming collision, in-batch incoming dup, distinct admits, empty inputs admit vacuously."

  - id: DSL-108
    section: "Evidence Mempool Policy"
    summary: "Block cap"
    status: verified
    spec_ref: "docs/requirements/domains/remark/specs/DSL-108.md"
    catalogue_ref: "docs/resources/SPEC.md#dsl-108"
    tests:
      - dsl_108_evidence_block_cap_test
    notes: "Adds pub fn enforce_block_level_slashing_caps(evidences: &[SlashingEvidence]) -> Result<(), SlashingError>. Strict `>` check, returns new SlashingError::BlockCapExceeded { actual, limit } variant (shared with DSL-119 appeal-cap). Adds MAX_SLASH_PROPOSALS_PER_BLOCK = 64 + MAX_APPEALS_PER_BLOCK = 64 constants (appeal cap shipped early for DSL-119 reuse, per SPEC §2.8). 3-test suite: MAX+1=65 rejects with both fields, exactly-MAX admits + regression guard MAX-1, empty admits vacuously."

  - id: DSL-109
    section: "Evidence Mempool Policy"
    summary: "Payload cap"
    status: verified
    spec_ref: "docs/requirements/domains/remark/specs/DSL-109.md"
    catalogue_ref: "docs/resources/SPEC.md#dsl-109"
    tests:
      - dsl_109_evidence_payload_cap_test
    notes: "Adds pub fn enforce_slashing_evidence_payload_cap(evidences: &[SlashingEvidence]) -> Result<(), SlashingError> + new SlashingError::EvidencePayloadTooLarge { actual, limit } variant (distinct from DSL-063 AppealPayloadTooLarge — different pipelines). Strict `>` on serde_json::to_vec(ev).len() against MAX_SLASH_PROPOSAL_PAYLOAD_BYTES=65_536. Short-circuits on first oversize. Closes DSL-102..109 evidence REMARK block (wire, puzzle, admission match/mismatch, mempool expiry/dedup, block count + payload caps). 3-test suite with InvalidBlockProof.failure_witness as variable-size lever + binary-search witness_len tuner to land at-limit boundary."

  - id: DSL-110
    section: "Appeal Wire"
    summary: "Appeal REMARK wire roundtrip"
    status: verified
    spec_ref: "docs/requirements/domains/remark/specs/DSL-110.md"
    catalogue_ref: "docs/resources/SPEC.md#dsl-110"
    tests:
      - dsl_110_appeal_remark_wire_roundtrip_test
    notes: "Opens appeal-side REMARK block. New src/remark/appeal_wire.rs mirrors evidence_wire.rs. encode_slash_appeal_remark_payload_v1(&SlashAppeal) = SLASH_APPEAL_REMARK_MAGIC_V1 || serde_json(ap). parse_slash_appeals_from_conditions generic over AsRef<[u8]>, strict prefix compare, silent-skip on short/foreign/malformed. Cross-category isolation pinned: evidence-magic payload does NOT leak into appeal parser. 4-test suite: roundtrip, magic pinned + anti-cross-category assertion, foreign/short/empty/garbage-JSON/evidence-prefix all skip, mixed interleaving preserves input order."

  - id: DSL-111
    section: "Appeal Wire"
    summary: "Appeal puzzle_reveal emits one REMARK"
    status: verified
    spec_ref: "docs/requirements/domains/remark/specs/DSL-111.md"
    catalogue_ref: "docs/resources/SPEC.md#dsl-111"
    tests:
      - dsl_111_appeal_puzzle_reveal_emits_one_remark_test
    notes: "Adds pub fn slash_appeal_remark_puzzle_reveal_v1 + slash_appeal_remark_puzzle_hash_v1 in src/remark/appeal_wire.rs. Appeal-side analogue of DSL-103 with identical quoted-constant CLVM shape `(q . ((1 payload)))` but SlashAppeal wire as payload. Hash via clvm_utils::tree_hash_from_bytes(reveal). SlashingError::InvalidSlashingEvidence used as unified error channel (appeal/evidence distinction is diagnostic-only). 4-test suite: exactly one Condition::Remark, payload round-trips through DSL-110 parser, hash deterministic + binds appellant_index mutations, hash equals tree_hash_from_bytes(reveal)."

