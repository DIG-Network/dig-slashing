domain_id: appeal
normative: NORMATIVE.md
verification: VERIFICATION.md

items:
  - id: DSL-034
    section: "Proposer Appeal"
    summary: "ProposerAppeal HeadersIdentical sustained"
    status: verified
    spec_ref: "docs/requirements/domains/appeal/specs/DSL-034.md"
    catalogue_ref: "docs/resources/SPEC.md#dsl-034"
    tests:
      - dsl_034_proposer_appeal_headers_identical_sustained_test
    notes: "Opens Phase 2. New src/appeal/ module tree (ground.rs, envelope.rs, verdict.rs, verify.rs). Predicate: header_a.message == header_b.message. Evidence-only. 4-test suite: identical→Sustained, distinct→Rejected, signature-mutation-ignored, determinism."

  - id: DSL-035
    section: "Proposer Appeal"
    summary: "ProposerAppeal ProposerIndexMismatch sustained"
    status: verified
    spec_ref: "docs/requirements/domains/appeal/specs/DSL-035.md"
    catalogue_ref: "docs/resources/SPEC.md#dsl-035"
    tests:
      - dsl_035_proposer_appeal_proposer_index_mismatch_test
    notes: "verify_proposer_appeal_proposer_index_mismatch. Predicate: header_a.proposer_index != header_b.proposer_index. 4-test suite: different→Sustained, matching→Rejected, off-by-one→Sustained, determinism."

  - id: DSL-036
    section: "Proposer Appeal"
    summary: "ProposerAppeal SignatureAInvalid sustained"
    status: verified
    spec_ref: "docs/requirements/domains/appeal/specs/DSL-036.md"
    catalogue_ref: "docs/resources/SPEC.md#dsl-036"
    tests:
      - dsl_036_proposer_appeal_signature_a_invalid_test
    notes: "verify_proposer_appeal_signature_a_invalid re-runs chia_bls::verify over header_a's signature against block_signing_message. Shared helper verify_proposer_appeal_signature_side parameterised by SustainReason — reused by DSL-037. Sustains on: BLS verify false, bad sig width, sig decode fail, unknown validator. 6-test suite: corrupted sig → Sustained, valid → Rejected, wrong-key → Sustained, cross-network replay → Sustained, unknown validator → Sustained, bad sig width → Sustained."

  - id: DSL-037
    section: "Proposer Appeal"
    summary: "ProposerAppeal SignatureBInvalid sustained"
    status: verified
    spec_ref: "docs/requirements/domains/appeal/specs/DSL-037.md"
    catalogue_ref: "docs/resources/SPEC.md#dsl-037"
    tests:
      - dsl_037_proposer_appeal_signature_b_invalid_test
    notes: "verify_proposer_appeal_signature_b_invalid mirrors DSL-036 on signed_header_b via shared verify_proposer_appeal_signature_side helper. 6-test suite: corrupted sig_b → Sustained, valid → Rejected, wrong-key → Sustained, cross-network → Sustained, sig_a corruption ignored on B path, bad sig width → Sustained."

  - id: DSL-038
    section: "Proposer Appeal"
    summary: "ProposerAppeal SlotMismatch sustained"
    status: verified
    spec_ref: "docs/requirements/domains/appeal/specs/DSL-038.md"
    catalogue_ref: "docs/resources/SPEC.md#dsl-038"
    tests:
      - dsl_038_proposer_appeal_slot_mismatch_test
    notes: "verify_proposer_appeal_slot_mismatch. Predicate: header_a.height != header_b.height. Evidence-only, witness ignored. 3-test suite: different heights → Sustained, same height → Rejected, adjacent off-by-one heights → Sustained."

  - id: DSL-039
    section: "Proposer Appeal"
    summary: "ProposerAppeal ValidatorNotActiveAtEpoch sustained"
    status: verified
    spec_ref: "docs/requirements/domains/appeal/specs/DSL-039.md"
    catalogue_ref: "docs/resources/SPEC.md#dsl-039"
    tests:
      - dsl_039_proposer_appeal_validator_not_active_test
    notes: "verify_proposer_appeal_validator_not_active_at_epoch. Predicate: !validator_view.get(header_a.proposer_index).is_active_at_epoch(header_a.epoch). Unknown validator → Sustained (coarse). Uses header A — DSL-013 guarantees same proposer_index on both headers. 6-test suite: pre-activation → Sustained, post-exit → Sustained, active → Rejected, epoch == activation_epoch → Rejected (inclusive), epoch == exit_epoch → Sustained (exclusive), unknown validator → Sustained."

  - id: DSL-040
    section: "Proposer Appeal"
    summary: "ProposerAppeal rejected on false claim"
    status: verified
    spec_ref: "docs/requirements/domains/appeal/specs/DSL-040.md"
    catalogue_ref: "docs/resources/SPEC.md#dsl-040"
    tests:
      - dsl_040_proposer_appeal_rejected_on_false_claim_test
    notes: "Closes the 6-ground proposer appeal surface (DSL-034..039) with a symmetric rejection matrix. Builds a single `genuine()` fixture with honest equivocation evidence + active validator, then asserts every verify_proposer_appeal_* function returns Rejected{GroundDoesNotHold}. 6 tests: HeadersIdentical-false-claim, ProposerIndexMismatch-false, SignatureAInvalid-false, SignatureBInvalid-false, SlotMismatch-false, ValidatorNotActiveAtEpoch-false."

  - id: DSL-041
    section: "Attester Appeal"
    summary: "AttesterAppeal AttestationsIdentical sustained"
    status: verified
    spec_ref: "docs/requirements/domains/appeal/specs/DSL-041.md"
    catalogue_ref: "docs/resources/SPEC.md#dsl-041"
    tests:
      - dsl_041_attester_appeal_attestations_identical_test
    notes: "verify_attester_appeal_attestations_identical. Byte-wise IndexedAttestation equality (indices + data + signature). 3-test suite: byte-equal → Sustained, distinct data → Rejected, sig-only difference still distinct → Rejected."

  - id: DSL-042
    section: "Attester Appeal"
    summary: "AttesterAppeal NotSlashableByPredicate sustained"
    status: verified
    spec_ref: "docs/requirements/domains/appeal/specs/DSL-042.md"
    catalogue_ref: "docs/resources/SPEC.md#dsl-042"
    tests:
      - dsl_042_attester_appeal_not_slashable_predicate_test
    notes: "verify_attester_appeal_not_slashable_by_predicate re-evaluates DSL-014 (double-vote) + DSL-015 (surround-vote) predicates over the stored evidence, sustains when neither holds. Evidence-only. 4-test suite: disjoint windows → Sustained, double-vote → Rejected, a-surrounds-b → Rejected, b-surrounds-a → Rejected."

  - id: DSL-043
    section: "Attester Appeal"
    summary: "AttesterAppeal EmptyIntersection sustained"
    status: verified
    spec_ref: "docs/requirements/domains/appeal/specs/DSL-043.md"
    catalogue_ref: "docs/resources/SPEC.md#dsl-043"
    tests:
      - dsl_043_attester_appeal_empty_intersection_test
    notes: "verify_attester_appeal_empty_intersection delegates to AttesterSlashing::slashable_indices().is_empty() (DSL-007 two-pointer intersection). Evidence-only; witness ignored. 3-test suite: disjoint [1,2]∩[3,4]=∅ → Sustained, overlap [1,2]∩[2,3]={2} → Rejected, identical sets → Rejected."

  - id: DSL-044
    section: "Attester Appeal"
    summary: "AttesterAppeal SignatureAInvalid sustained"
    status: verified
    spec_ref: "docs/requirements/domains/appeal/specs/DSL-044.md"
    catalogue_ref: "docs/resources/SPEC.md#dsl-044"
    tests:
      - dsl_044_attester_appeal_signature_a_invalid_test
    notes: "verify_attester_appeal_signature_a_invalid re-runs IndexedAttestation::verify_signature (DSL-006) over attestation_a; any failure (bad sig bytes, bad G2 point, unknown attester, crypto reject) → Sustained{AttesterSignatureAInvalid}. Shared helper verify_attester_appeal_signature_side reused for DSL-045. 3-test suite: corrupted sig → Sustained, honest aggregate → Rejected, substituted pubkey → Sustained."

  - id: DSL-045
    section: "Attester Appeal"
    summary: "AttesterAppeal SignatureBInvalid sustained"
    status: verified
    spec_ref: "docs/requirements/domains/appeal/specs/DSL-045.md"
    catalogue_ref: "docs/resources/SPEC.md#dsl-045"
    tests:
      - dsl_045_attester_appeal_signature_b_invalid_test
    notes: "verify_attester_appeal_signature_b_invalid mirrors DSL-044 on attestation_b via shared helper verify_attester_appeal_signature_side. 3-test suite: corrupted sig_b → Sustained, honest sig_b → Rejected, sig_a corruption does NOT leak to B-side verdict (cross-leak guard proving the verifier reads the correct field)."

  - id: DSL-046
    section: "Attester Appeal"
    summary: "AttesterAppeal InvalidIndexedAttestationStructure sustained"
    status: verified
    spec_ref: "docs/requirements/domains/appeal/specs/DSL-046.md"
    catalogue_ref: "docs/resources/SPEC.md#dsl-046"
    tests:
      - dsl_046_attester_appeal_invalid_structure_test
    notes: "verify_attester_appeal_invalid_indexed_attestation_structure inverts DSL-005; sustains when either side's validate_structure() returns Err. Evidence-only. 6-test suite covers every DSL-005 failure leg: non-ascending [3,2,1], duplicate [1,1,2], empty [], over-cap MAX_VALIDATORS_PER_COMMITTEE+1, bad sig width 95 bytes, plus well-formed determinism guard."

  - id: DSL-047
    section: "Attester Appeal"
    summary: "AttesterAppeal ValidatorNotInIntersection sustained"
    status: verified
    spec_ref: "docs/requirements/domains/appeal/specs/DSL-047.md"
    catalogue_ref: "docs/resources/SPEC.md#dsl-047"
    tests:
      - dsl_047_attester_appeal_validator_not_in_intersection_test
    notes: "verify_attester_appeal_validator_not_in_intersection(evidence, validator_index) returns Sustained{ValidatorNotInIntersection} iff the named index is absent from slashable_indices() (DSL-007). Parameterised on validator_index so the per-validator revert scope required by DSL-064 adjudicator is free: same evidence + different named indices produce independent verdicts. 3-test suite: not-in-intersection → Sustained, in-intersection → Rejected, scope sweep over {1,2,3,4,99}."

  - id: DSL-048
    section: "Attester Appeal"
    summary: "AttesterAppeal rejected on genuine slash"
    status: verified
    spec_ref: "docs/requirements/domains/appeal/specs/DSL-048.md"
    catalogue_ref: "docs/resources/SPEC.md#dsl-048"
    tests:
      - dsl_048_attester_appeal_rejected_genuine_test
    notes: "Negative-control sweep across all 7 attester-appeal verifiers (DSL-041..047). Single fixture: well-formed, honestly-signed double-vote with attesting_indices_a=[1,2,3] + attesting_indices_b=[2,3,4] (intersection {2,3}), both sides signed under a shared index→(sk,pk) BTreeMap so MapLookup verifies both aggregates. Each verifier returns Rejected{GroundDoesNotHold}. Test-only (no src/ changes) — mirrors DSL-040 on the attester side."

  - id: DSL-049
    section: "InvalidBlock Appeal"
    summary: "InvalidBlockAppeal BlockActuallyValid sustained"
    status: verified
    spec_ref: "docs/requirements/domains/appeal/specs/DSL-049.md"
    catalogue_ref: "docs/resources/SPEC.md#dsl-049"
    tests:
      - dsl_049_invalid_block_appeal_block_valid_test
    notes: "verify_invalid_block_appeal_block_actually_valid(evidence, appeal_witness, oracle: Option<&dyn InvalidBlockOracle>) delegates to oracle.re_execute(&header, appeal_witness). Ok(Valid) → Sustained{BlockActuallyValid}, Ok(Invalid(_)) → Rejected{GroundDoesNotHold}, Err(_) → Rejected{MalformedWitness}, None oracle → Rejected{MissingOracle}. Critical design: forwards the APPEAL's witness (not evidence.failure_witness) so the appellant can supply fresh replay material. 4-test suite: Valid/Invalid/None/passthrough byte-equality."

  - id: DSL-050
    section: "InvalidBlock Appeal"
    summary: "InvalidBlockAppeal ProposerSignatureInvalid sustained"
    status: verified
    spec_ref: "docs/requirements/domains/appeal/specs/DSL-050.md"
    catalogue_ref: "docs/resources/SPEC.md#dsl-050"
    tests:
      - dsl_050_invalid_block_appeal_sig_invalid_test
    notes: "verify_invalid_block_appeal_proposer_signature_invalid re-runs chia_bls::verify over (signed_header.signature, proposer_pk, block_signing_message(...)). Pure BLS — no oracle. Reuses shared helper verify_proposer_appeal_signature_side with sustain_reason=ProposerSignatureInvalid; same decode-failure / unknown-validator / crypto-reject contract as DSL-036/037/044/045. 3-test suite: corrupted sig → Sustained, honest sig → Rejected, cross-network sig → Sustained (domain-separation guard)."

  - id: DSL-051
    section: "InvalidBlock Appeal"
    summary: "InvalidBlockAppeal FailureReasonMismatch sustained"
    status: verified
    spec_ref: "docs/requirements/domains/appeal/specs/DSL-051.md"
    catalogue_ref: "docs/resources/SPEC.md#dsl-051"
    tests:
      - dsl_051_invalid_block_appeal_reason_mismatch_test
    notes: "verify_invalid_block_appeal_failure_reason_mismatch(evidence, appeal_witness, oracle) calls oracle.re_execute; Ok(Invalid(actual)) with actual != evidence.failure_reason → Sustained{FailureReasonMismatch}; Ok(Invalid(same)) or Ok(Valid) → Rejected{GroundDoesNotHold}; Err → Rejected{MalformedWitness}; None oracle → Rejected{MissingOracle}. Forwards APPEAL's witness (not evidence.failure_witness) — same rationale as DSL-049. 4-test suite: differ → Sustained, match → Rejected, Valid → Rejected, None → MissingOracle."

  - id: DSL-052
    section: "InvalidBlock Appeal"
    summary: "InvalidBlockAppeal EvidenceEpochMismatch sustained"
    status: verified
    spec_ref: "docs/requirements/domains/appeal/specs/DSL-052.md"
    catalogue_ref: "docs/resources/SPEC.md#dsl-052"
    tests:
      - dsl_052_invalid_block_appeal_epoch_mismatch_test
    notes: "verify_invalid_block_appeal_evidence_epoch_mismatch(evidence, evidence_epoch: u64) returns Sustained{EvidenceEpochMismatch} iff evidence.signed_header.message.epoch != evidence_epoch. Pure local check, no oracle, no BLS. Verifier takes the envelope epoch as a top-level arg so the dispatcher forwards SlashingEvidence::epoch directly rather than re-embedding it in the appeal. 3-test suite: 5 vs 6 → Sustained, equal → Rejected, off-by-one either direction (4 vs 5; 5 vs 6) → Sustained (strict-inequality guard)."

  - id: DSL-053
    section: "InvalidBlock Appeal"
    summary: "InvalidBlockAppeal MissingOracle error"
    status: verified
    spec_ref: "docs/requirements/domains/appeal/specs/DSL-053.md"
    catalogue_ref: "docs/resources/SPEC.md#dsl-053"
    tests:
      - dsl_053_invalid_block_appeal_missing_oracle_test
    notes: "Contract fixture for light-client parity. Test-only (no src/ changes). 4-test suite proves the oracle-dependency split: BlockActuallyValid (DSL-049) + None → Rejected{MissingOracle}, FailureReasonMismatch (DSL-051) + None → Rejected{MissingOracle}, ProposerSignatureInvalid (DSL-050) has no oracle param and runs end-to-end (Rejected on honest sig), EvidenceEpochMismatch (DSL-052) has no oracle param and runs end-to-end (Sustained on mismatch)."

  - id: DSL-054
    section: "InvalidBlock Appeal"
    summary: "InvalidBlockAppeal rejected on genuine invalid block"
    status: verified
    spec_ref: "docs/requirements/domains/appeal/specs/DSL-054.md"
    catalogue_ref: "docs/resources/SPEC.md#dsl-054"
    tests:
      - dsl_054_invalid_block_appeal_rejected_test
    notes: "Negative-control sweep closing the invalid-block appeal section. Test-only (no src/ changes). Single fixture: honestly-signed header (proposer_index=7, epoch=5), InvalidOracle returns Invalid(BadStateRoot) matching evidence.failure_reason, envelope epoch = header.epoch = 5. Each of the 4 invalid-block verifiers (DSL-049/050/051/052) returns Rejected{GroundDoesNotHold}. Mirrors DSL-040 (proposer) + DSL-048 (attester) patterns."

  - id: DSL-055
    section: "Submission Preconditions"
    summary: "submit_appeal UnknownEvidence"
    status: verified
    spec_ref: "docs/requirements/domains/appeal/specs/DSL-055.md"
    catalogue_ref: "docs/resources/SPEC.md#dsl-055"
    tests:
      - dsl_055_submit_appeal_unknown_evidence_test
    notes: "Opens submit_appeal pipeline. Adds SlashingManager::submit_appeal(&SlashAppeal, &mut dyn BondEscrow) -> Result<(), SlashingError> + SlashingError::UnknownEvidence(String) variant. First precondition: book.get(&appeal.evidence_hash).ok_or(UnknownEvidence(hex(hash)))? runs BEFORE any bond operation. hex_encode helper inline in manager.rs (no new dep). 3-test suite: fresh hash → UnknownEvidence, bond.lock_calls == 0 on reject path, hex payload is 64-char lowercase matching raw bytes 0x00..0x1f."

  - id: DSL-056
    section: "Submission Preconditions"
    summary: "submit_appeal WindowExpired"
    status: verified
    spec_ref: "docs/requirements/domains/appeal/specs/DSL-056.md"
    catalogue_ref: "docs/resources/SPEC.md#dsl-056"
    tests:
      - dsl_056_submit_appeal_window_expired_test
    notes: "Second submit_appeal precondition. Adds SlashingError::AppealWindowExpired{submitted_at,window,current}. Rejects iff appeal.filed_epoch > pending.window_expires_at_epoch — closed-interval semantics: filed_epoch == submitted_at + SLASH_APPEAL_WINDOW_EPOCHS is still accepted. Runs AFTER UnknownEvidence (DSL-055) and BEFORE bond lock (DSL-062). 3-test suite with fabricated PendingSlash via book_mut().insert(): boundary → Ok, boundary+1 → AppealWindowExpired (+ zero lock_calls), in-window → Ok."

  - id: DSL-057
    section: "Submission Preconditions"
    summary: "submit_appeal VariantMismatch"
    status: verified
    spec_ref: "docs/requirements/domains/appeal/specs/DSL-057.md"
    catalogue_ref: "docs/resources/SPEC.md#dsl-057"
    tests:
      - dsl_057_submit_appeal_variant_mismatch_test
    notes: "Third submit_appeal precondition. Adds SlashingError::AppealVariantMismatch. Cheap structural check: appeal.payload variant must match pending.evidence.payload variant (Proposer↔Proposer, Attester↔Attester, InvalidBlock↔InvalidBlock). Runs AFTER UnknownEvidence/WindowExpired, BEFORE bond lock. 4-test suite: 3 cross-variant combos reject with zero lock_calls, all 3 matching pairs pass."

  - id: DSL-058
    section: "Submission Preconditions"
    summary: "submit_appeal DuplicateAppeal"
    status: verified
    spec_ref: "docs/requirements/domains/appeal/specs/DSL-058.md"
    catalogue_ref: "docs/resources/SPEC.md#dsl-058"
    tests:
      - dsl_058_submit_appeal_duplicate_test
    notes: "Fourth submit_appeal precondition. Adds SlashingError::DuplicateAppeal + SlashAppeal::hash() (DSL-058/159 preview: SHA-256(DOMAIN_SLASH_APPEAL || bincode(self))). DOMAIN_SLASH_APPEAL = b\"DIG_SLASH_APPEAL_V1\" added to constants. Rejects iff appeal.hash() is already in pending.appeal_history. 3-test suite: byte-equal duplicate → DuplicateAppeal + zero lock_calls, witness diff → accepted (witness participates in hash), ground diff → accepted (enum discriminant participates)."

  - id: DSL-059
    section: "Submission Preconditions"
    summary: "submit_appeal TooManyAttempts"
    status: verified
    spec_ref: "docs/requirements/domains/appeal/specs/DSL-059.md"
    catalogue_ref: "docs/resources/SPEC.md#dsl-059"
    tests:
      - dsl_059_submit_appeal_too_many_attempts_test
    notes: "Fifth submit_appeal precondition. Adds MAX_APPEAL_ATTEMPTS_PER_SLASH = 4 (SPEC §2.6) + SlashingError::TooManyAttempts{count,limit}. Rejects iff appeal_history.len() >= cap. Runs AFTER DuplicateAppeal, BEFORE bond lock. 2-test suite: 4 seeded priors + 5th → TooManyAttempts{4,4} + zero lock_calls, 3 priors + 4th → Ok."

  - id: DSL-060
    section: "Submission Preconditions"
    summary: "submit_appeal SlashAlreadyReverted"
    status: verified
    spec_ref: "docs/requirements/domains/appeal/specs/DSL-060.md"
    catalogue_ref: "docs/resources/SPEC.md#dsl-060"
    tests:
      - dsl_060_submit_appeal_already_reverted_test
    notes: "Terminal-state guard. Adds SlashingError::SlashAlreadyReverted + SlashAlreadyFinalised. submit_appeal matches pending.status: Reverted{..} → SlashAlreadyReverted, Finalised{..} → SlashAlreadyFinalised (DSL-061), Accepted/ChallengeOpen pass through. Checked right after UnknownEvidence so terminal state short-circuits cheaply. 2-test suite: Reverted → error + zero lock_calls, Accepted → Ok."

  - id: DSL-061
    section: "Submission Preconditions"
    summary: "submit_appeal SlashAlreadyFinalised"
    status: verified
    spec_ref: "docs/requirements/domains/appeal/specs/DSL-061.md"
    catalogue_ref: "docs/resources/SPEC.md#dsl-061"
    tests:
      - dsl_061_submit_appeal_already_finalised_test
    notes: "Second half of the terminal-state guard from DSL-060 (error variant SlashAlreadyFinalised + match arm already in place). Test-only (no src/ changes). 2-test suite: PendingSlash with status=Finalised{finalised_at_epoch:20} → SlashAlreadyFinalised + zero lock_calls, Accepted → Ok."

  - id: DSL-062
    section: "Submission Preconditions"
    summary: "submit_appeal escrows appellant bond"
    status: verified
    spec_ref: "docs/requirements/domains/appeal/specs/DSL-062.md"
    catalogue_ref: "docs/resources/SPEC.md#dsl-062"
    tests:
      - dsl_062_submit_appeal_escrows_appellant_bond_test
    notes: "Final admission step. Adds SlashingError::AppellantBondLockFailed(String) carrying BondError Display text. submit_appeal ends with bond_escrow.lock(appellant_index, APPELLANT_BOND_MOJOS, Appellant(appeal.hash())). Placed AFTER every structural check (DSL-055..061) so cheap rejections never touch collateral. 3-test suite with RecordingBond mock: lock success → exactly one (idx, APPELLANT_BOND_MOJOS, Appellant(hash)) record, InsufficientBalance → AppellantBondLockFailed (+ 1 lock call recorded proving escrow was reached), tag byte-equal to Appellant(appeal.hash())."

  - id: DSL-063
    section: "Submission Preconditions"
    summary: "submit_appeal PayloadTooLarge"
    status: verified
    spec_ref: "docs/requirements/domains/appeal/specs/DSL-063.md"
    catalogue_ref: "docs/resources/SPEC.md#dsl-063"
    tests:
      - dsl_063_submit_appeal_payload_too_large_test
    notes: "Caps bincode-serialised SlashAppeal at MAX_APPEAL_PAYLOAD_BYTES = 131_072 (128 KiB). Adds constant + SlashingError::AppealPayloadTooLarge{actual,limit}. Measured with bincode (same canonical form as SlashAppeal::hash) rather than serde_json per SPEC §2.6. Runs AFTER TooManyAttempts, BEFORE DSL-062 bond lock. 3-test suite with witness-length solver: exactly cap → Ok (closed boundary), cap+1 → AppealPayloadTooLarge + zero lock_calls, 1 KiB → Ok."

  - id: DSL-064
    section: "Adjudicator"
    summary: "Adjudicate Sustained reverts base slash via credit_stake"
    status: verified
    spec_ref: "docs/requirements/domains/appeal/specs/DSL-064.md"
    catalogue_ref: "docs/resources/SPEC.md#dsl-064"
    tests:
      - dsl_064_adjudicate_sustained_reverts_base_slash_test
    notes: "Opens adjudicator module (src/appeal/adjudicator.rs). adjudicate_sustained_revert_base_slash(pending, appeal, verdict, validator_set) -> Vec<u32>. Rejected → no-op empty vec. Sustained{ValidatorNotInIntersection} → only named index from attester ground variant; every other Sustained → all indices in base_slash_per_validator. Calls ValidatorEntry::credit_stake per slashed validator; skips absent validators. 3-test suite: single (proposer), multi (attester 3 validators), per-index (ValidatorNotInIntersection{validator_index:3})."

  - id: DSL-065
    section: "Adjudicator"
    summary: "Adjudicate Sustained reverts collateral"
    status: verified
    spec_ref: "docs/requirements/domains/appeal/specs/DSL-065.md"
    catalogue_ref: "docs/resources/SPEC.md#dsl-065"
    tests:
      - dsl_065_adjudicate_sustained_reverts_collateral_test
    notes: "Adds CollateralSlasher trait (credit(u32, u64)) + collateral_slashed: u64 field on PerValidatorSlash (serde default 0). adjudicate_sustained_revert_collateral(pending, appeal, verdict, Option<&mut dyn CollateralSlasher>) -> Vec<u32> mirrors DSL-064 scope branching, calls slasher.credit per validator where collateral_slashed > 0. Light-client path (None slasher) is no-op. 3-test suite: 3 non-zero → 3 credits in order, None → empty, zero entries skipped per-item."

  - id: DSL-066
    section: "Adjudicator"
    summary: "Adjudicate Sustained restores validator status"
    status: verified
    spec_ref: "docs/requirements/domains/appeal/specs/DSL-066.md"
    catalogue_ref: "docs/resources/SPEC.md#dsl-066"
    tests:
      - dsl_066_adjudicate_sustained_restores_status_test
    notes: "adjudicate_sustained_restore_status(pending, appeal, verdict, validator_set) -> Vec<u32> calls ValidatorEntry::restore_status per reverted validator; returns indices whose call returned true (actually transitioned Slashed→Active). Idempotent on already-active (omitted from result vec). Same DSL-064 scope branching. 3-test suite: single Sustained → 1 call, pre is_slashed()=true + post is_slashed()=false, 3-validator multi → 3 calls."

  - id: DSL-067
    section: "Adjudicator"
    summary: "Adjudicate Sustained clawback wb + prop rewards"
    status: verified
    spec_ref: "docs/requirements/domains/appeal/specs/DSL-067.md"
    catalogue_ref: "docs/resources/SPEC.md#dsl-067"
    tests:
      - dsl_067_adjudicate_sustained_clawback_rewards_test
    notes: "adjudicate_sustained_clawback_rewards(pending, verdict, reward_clawback, proposer_puzzle_hash) -> ClawbackResult. Recomputes wb_amount = total_eff_bal / WHISTLEBLOWER_REWARD_QUOTIENT and prop_amount = wb_amount / PROPOSER_REWARD_QUOTIENT from pending.base_slash_per_validator (self-contained — no SlashingResult dep). Two unconditional claw_back calls (reporter + proposer). Shortfall = (wb+prop) - (wb_clawed+prop_clawed) for DSL-073. Full clawback on any Sustained (including ValidatorNotInIntersection). Rejected → zero-filled result. 4-test suite: wb call, prop call, full no-shortfall, half → shortfall = wb+prop - got."

  - id: DSL-068
    section: "Adjudicator"
    summary: "Adjudicate Sustained reporter-bond 50/50 split"
    status: verified
    spec_ref: "docs/requirements/domains/appeal/specs/DSL-068.md"
    catalogue_ref: "docs/resources/SPEC.md#dsl-068"
    tests:
      - dsl_068_adjudicate_sustained_bond_split_test
    notes: "Adds BOND_AWARD_TO_WINNER_BPS = 5_000 (SPEC §2.6) + BondSplitResult{forfeited, winner_award, burn}. adjudicate_sustained_forfeit_reporter_bond(pending, appeal, verdict, bond_escrow, reward_payout) -> Result<BondSplitResult, BondError>. Forfeits reporter via bond_escrow.forfeit(reporter_idx, REPORTER_BOND_MOJOS, Reporter(hash)); splits forfeited integer-divided by BPS (floor toward appellant, remainder to burn); pays appellant_puzzle_hash unconditionally. Rejected → zero-filled result. 4-test suite: forfeit call shape, 1000 → (500,500), pay recorded, rounding table 1→(0,1)/2→(1,1)/3→(1,2)."

  - id: DSL-069
    section: "Adjudicator"
    summary: "Adjudicate Sustained reporter penalty"
    status: verified
    spec_ref: "docs/requirements/domains/appeal/specs/DSL-069.md"
    catalogue_ref: "docs/resources/SPEC.md#dsl-069"
    tests:
      - dsl_069_adjudicate_sustained_reporter_penalty_test
    notes: "Adds ReporterPenalty{reporter_index, effective_balance_at_slash, penalty_mojos} + adjudicate_sustained_reporter_penalty(pending, verdict, validator_set, effective_balances, slashed_in_window, current_epoch) -> Option<ReporterPenalty>. Slashes reporter via InvalidBlock base formula (identical to DSL-022 InvalidBlock branch) + inserts (current_epoch, reporter_idx) → eff_bal into slashed_in_window for DSL-030 correlation amplification. Rejected → None. Absent reporter → None (defensive). 3-test suite: slash_absolute call shape, window insert, formula parity with InvalidBlock arithmetic."

  - id: DSL-070
    section: "Adjudicator"
    summary: "Adjudicate Sustained status Reverted"
    status: verified
    spec_ref: "docs/requirements/domains/appeal/specs/DSL-070.md"
    catalogue_ref: "docs/resources/SPEC.md#dsl-070"
    tests:
      - dsl_070_adjudicate_sustained_status_reverted_test
    notes: "adjudicate_sustained_status_reverted(pending: &mut, appeal, verdict, current_epoch) mutates pending: pushes AppealAttempt{outcome: Won, bond_mojos: APPELLANT_BOND_MOJOS, ..} then flips status to Reverted{winning_appeal_hash: appeal.hash(), reverted_at_epoch}. Push-before-flip ordering so observers see consistent state (history + status together). Rejected → no-op (DSL-072 handles the rejected-path bookkeeping). 4-test suite: status shape, hash+epoch, history entry populated, end-to-end manager SlashAlreadyReverted on subsequent submit_appeal."

  - id: DSL-071
    section: "Adjudicator"
    summary: "Adjudicate Rejected appellant-bond 50/50 split"
    status: verified
    spec_ref: "docs/requirements/domains/appeal/specs/DSL-071.md"
    catalogue_ref: "docs/resources/SPEC.md#dsl-071"
    tests:
      - dsl_071_adjudicate_rejected_bond_split_test
    notes: "adjudicate_rejected_forfeit_appellant_bond(pending, appeal, verdict, bond_escrow, reward_payout) -> Result<BondSplitResult, BondError>. Mirror of DSL-068 with losing/winning parties swapped: forfeits APPELLANT_BOND_MOJOS via Appellant(appeal.hash()) tag, splits 50/50 (floor toward reporter, remainder to burn), pays reporter_puzzle_hash. Sustained → zero-filled result. Reuses BondSplitResult struct. 3-test suite: appellant forfeit call shape, 1000 → (500,500), pay call shape."

  - id: DSL-072
    section: "Adjudicator"
    summary: "Adjudicate Rejected keeps ChallengeOpen + appeal_count+1"
    status: verified
    spec_ref: "docs/requirements/domains/appeal/specs/DSL-072.md"
    catalogue_ref: "docs/resources/SPEC.md#dsl-072"
    tests:
      - dsl_072_adjudicate_rejected_challenge_open_test
    notes: "adjudicate_rejected_challenge_open(pending: &mut, appeal, verdict, reason_hash) transitions status Accepted→ChallengeOpen{first_appeal_filed_epoch: appeal.filed_epoch, appeal_count: 1} or ChallengeOpen{first, count}→ChallengeOpen{first (preserved), count.saturating_add(1)}. Reverted/Finalised are defensive no-ops (DSL-060/061 already guard those). Pushes AppealAttempt{outcome: Lost{reason_hash}, bond_mojos: APPELLANT_BOND_MOJOS, ..}. Sustained → no-op. 4-test suite: first sets count=1, second increments, first_appeal_filed_epoch preserved across 3 rejections from epochs 10/11/15, Lost history entry."

  - id: DSL-073
    section: "Adjudicator"
    summary: "Adjudicate clawback shortfall absorbed from bond"
    status: verified
    spec_ref: "docs/requirements/domains/appeal/specs/DSL-073.md"
    catalogue_ref: "docs/resources/SPEC.md#dsl-073"
    tests:
      - dsl_073_adjudicate_clawback_shortfall_test
    notes: "Closes the adjudicator. Adds ShortfallAbsorption{clawback_shortfall, original_burn, final_burn, residue} + adjudicate_absorb_clawback_shortfall(clawback: &ClawbackResult, bond_split: &BondSplitResult) -> ShortfallAbsorption. final_burn = original_burn + shortfall; residue = saturating_sub(final_burn, forfeited). Residue surfaced via struct field (no tracing dep). 4-test suite: zero shortfall pass-through, partial absorbed, struct propagation, residue when shortfall > bond."

  - id: DSL-159
    section: "SlashAppeal Hash + Serde"
    summary: "SlashAppeal::hash determinism + sensitivity"
    status: verified
    spec_ref: "docs/requirements/domains/appeal/specs/DSL-159.md"
    catalogue_ref: "docs/resources/SPEC.md#dsl-159"
    tests:
      - dsl_159_slash_appeal_hash_determinism_test
    notes: "No src/ changes — SlashAppeal::hash already implemented in src/appeal/envelope.rs as SHA-256(DOMAIN_SLASH_APPEAL || bincode(self)). 7-test suite pins determinism + per-field mutation sensitivity + domain-prefix load-bearing. Mutations: evidence_hash byte flip, appellant_index (42→43→u32::MAX triangle), puzzle_hash byte flip, filed_epoch, payload.witness byte flip + payload.ground enum variant flip. Domain-prefix test manually reconstructs SHA-256(DOMAIN || bincode) matching appeal.hash() AND asserts undomained SHA-256(bincode) DIFFERS — proves the domain tag is actually fed into the hasher (otherwise evidence and appeal envelopes with identical bytes would collide across pending-book / appeal-history lookups)."

  - id: DSL-160
    section: "SlashAppeal Hash + Serde"
    summary: "SlashAppeal + SlashAppealPayload serde roundtrip"
    status: verified
    spec_ref: "docs/requirements/domains/appeal/specs/DSL-160.md"
    catalogue_ref: "docs/resources/SPEC.md#dsl-160"
    tests:
      - dsl_160_slash_appeal_serde_roundtrip_test
    notes: "No src/ changes — existing `#[derive(Serialize, Deserialize)]` on SlashAppeal, SlashAppealPayload, and all three ground enums already satisfy the contract. 5-test suite enumerates every ground-enum discriminant (6 Proposer + 7 Attester + 4 InvalidBlock = 17 total) × bincode + serde_json. Generic roundtrip helpers also assert appeal.hash() stability (DSL-159 canonical form) to guard against DSL-058 dedup drift. Struct-variant ValidatorNotInIntersection probed across [0, 1, 42, u32::MAX-1, u32::MAX]. Witness serde_bytes verified via bincode 64-byte 0xEF run grep + JSON 239 probe + cross-codec bincode→json→struct preservation."

  - id: DSL-161
    section: "SlashAppeal Hash + Serde"
    summary: "PendingSlash + AppealAttempt + PendingSlashStatus serde"
    status: verified
    spec_ref: "docs/requirements/domains/appeal/specs/DSL-161.md"
    catalogue_ref: "docs/resources/SPEC.md#dsl-161"
    tests:
      - dsl_161_pending_slash_serde_roundtrip_test
    notes: "No src/ changes — existing `#[derive(Serialize, Deserialize)]` on PendingSlash, PendingSlashStatus, AppealAttempt, AppealOutcome, PerValidatorSlash already satisfy bincode persistence contract. 6-test suite: each PendingSlashStatus variant standalone + nested in PendingSlash (Accepted unit, ChallengeOpen {first_appeal_filed_epoch, appeal_count} drives DSL-056/059, Reverted {winning_appeal_hash, reverted_at_epoch}, Finalised {finalised_at_epoch}), AppealAttempt all 3 AppealOutcome variants (Won, Lost {reason_hash}, Pending) both standalone + mixed in appeal_history vec, full PendingSlash tree (ChallengeOpen + 2-entry history + evidence + verified + per_validator + reporter_bond) byte-exact roundtrip with per-level spot checks."

  - id: DSL-164
    section: "SlashAppeal Hash + Serde"
    summary: "AppealAdjudicationResult serde roundtrip"
    status: verified
    spec_ref: "docs/requirements/domains/appeal/specs/DSL-164.md"
    catalogue_ref: "docs/resources/SPEC.md#dsl-164"
    tests:
      - dsl_164_appeal_adjudication_result_serde_test
    notes: "Adds new AppealAdjudicationResult struct in src/appeal/adjudicator.rs (appeal_hash + evidence_hash + AppealOutcome + sustained-branch fields + rejected-branch fields + burn_amount). Exported from appeal/mod.rs + lib.rs. 5-test suite: sustained bincode (Won + populated vecs + non-zero awards + rejected fields stay zero), rejected bincode (empty vecs + Lost {reason_hash} payload preservation), both under serde_json, all 3 AppealOutcome variants nested, vec ordering preserved under both codecs (non-sorted insertion order guards against BTreeMap refactor). Produced by the future top-level adjudicate_appeal dispatcher; consumed by audit logs + RPC + test fixtures."

  - id: DSL-167
    section: "Phase 12 Integration Closures"
    summary: "adjudicate_appeal top-level dispatcher"
    status: verified
    spec_ref: "docs/requirements/domains/appeal/specs/DSL-167.md"
    catalogue_ref: "docs/resources/SPEC.md#dsl-167"
    tests:
      - dsl_167_adjudicate_appeal_dispatcher_test
    notes: "Adds pub fn adjudicate_appeal in src/appeal/adjudicator.rs that composes DSL-064..073 slice functions end-to-end. Signature takes verdict + pending + appeal + validator_set + effective_balances + Option<collateral> + bond + reward + reward_clawback + slashed_in_window + proposer_puzzle_hash + reason_hash + current_epoch, returns Result<AppealAdjudicationResult, BondError>. 6-test suite exercises both verdict branches (Sustained + Rejected happy paths with spy mocks), slice order via partial clawback forcing shortfall > 0 (verifies final_burn = bond_burn + clawback_shortfall proving clawback ran BEFORE forfeit BEFORE absorption), shortfall absorption, outcome matches verdict.to_appeal_outcome(), appeal_history grows by exactly 1 per call regardless of branch."

  - id: DSL-171
    section: "Phase 12 Integration Closures"
    summary: "AppealVerdict::to_appeal_outcome conversion"
    status: verified
    spec_ref: "docs/requirements/domains/appeal/specs/DSL-171.md"
    catalogue_ref: "docs/resources/SPEC.md#dsl-171"
    tests:
      - dsl_171_verdict_to_outcome_test
    notes: "Adds `impl AppealVerdict { pub fn to_appeal_outcome(&self) -> AppealOutcome }` in src/appeal/verdict.rs. Sustained{..} → Won; Rejected{reason} → Lost{reason_hash: SHA-256(bincode(reason))} via chia_sha2::Sha256. 5-test suite: exhaustive sustained over 17 AppealSustainReason variants → Won, rejected over 3 AppealRejectReason variants → Lost with manual-reconstruction reason_hash check (non-tautological), 10-round determinism, pairwise-distinct reason_hash across all reject variants, exhaustive never-Pending."
