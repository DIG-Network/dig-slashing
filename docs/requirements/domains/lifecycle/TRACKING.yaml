domain_id: lifecycle
normative: NORMATIVE.md
verification: VERIFICATION.md

items:
  - id: DSL-022
    section: "Optimistic Admission"
    summary: "submit_evidence applies base_slash = max(eff_bal*bps/10_000, eff_bal/32)"
    status: verified
    spec_ref: "docs/requirements/domains/lifecycle/specs/DSL-022.md"
    catalogue_ref: "docs/resources/SPEC.md#dsl-022"
    tests:
      - dsl_022_submit_evidence_base_slash_formula_test
    notes: "SlashingManager in src/manager.rs with submit_evidence method. Opens Phase 1. Pipeline: verify_evidence → iterate slashable indices → compute max(eff_bal*bps/10_000, eff_bal/32) → slash_absolute(amount, current_epoch). Skip already-slashed + absent-from-view. New traits: EffectiveBalanceView (SPEC §15.2). New constants: BPS_DENOMINATOR=10_000, MIN_SLASHING_PENALTY_QUOTIENT=32. New types: PerValidatorSlash, SlashingResult (SPEC §3.9). SlashingResult fields reward_*/burn/bond/hash are 0/empty placeholders pending DSL-023/024/025. Signature grows incrementally — bond/reward/proposer traits land with their DSLs. 10-test suite: bps dominates proposer (eff/20 wins), floor dominates attester double + surround (eff/32 beats eff/100), invalid-block floor wins one-mojo tiebreak (eff/32 > eff/33), per-validator vec cardinality equals intersection size, already-slashed skipped no slash_absolute call, absent-from-view surfaces as verify error, eff_bal=0 produces zero slash with slash_absolute(0) still called, determinism across two managers, slash_absolute receives current_epoch not offense epoch."

  - id: DSL-023
    section: "Optimistic Admission"
    summary: "submit_evidence escrows REPORTER_BOND_MOJOS via BondEscrow::lock"
    status: verified
    spec_ref: "docs/requirements/domains/lifecycle/specs/DSL-023.md"
    catalogue_ref: "docs/resources/SPEC.md#dsl-023"
    tests:
      - dsl_023_submit_evidence_escrows_reporter_bond_test
    notes: "submit_evidence now calls bond_escrow.lock(reporter_idx, REPORTER_BOND_MOJOS, BondTag::Reporter(evidence.hash())) AFTER verify_evidence but BEFORE any slash_absolute. Lock failure collapses to SlashingError::BondLockFailed with validator state untouched. New src/bonds.rs with BondEscrow trait + BondTag enum + BondError. New constants: MIN_EFFECTIVE_BALANCE=32e9 (stub for dig-consensus::MIN_VALIDATOR_COLLATERAL), REPORTER_BOND_MOJOS=MIN_EFFECTIVE_BALANCE/64=500_000_000, APPELLANT_BOND_MOJOS same. New SlashingError variant: BondLockFailed. SlashingResult.reporter_bond_escrowed populated. 8-test suite with RecordingBondEscrow mock: lock args exact, lock precedes slash_absolute via shared clock, reporter_bond_escrowed field equals constant, tag carries evidence.hash(), InsufficientBalance → BondLockFailed + no slash, REPORTER_BOND_MOJOS==MIN_EFFECTIVE_BALANCE/64 constant check, determinism across managers, no lock on OffenseTooOld (verify rejects first)."

  - id: DSL-024
    section: "Optimistic Admission"
    summary: "submit_evidence creates PendingSlash { status: Accepted, window_expires_at_epoch }"
    status: verified
    spec_ref: "docs/requirements/domains/lifecycle/specs/DSL-024.md"
    catalogue_ref: "docs/resources/SPEC.md#dsl-024"
    tests:
      - dsl_024_submit_evidence_creates_pending_accepted_test
    notes: "New src/pending.rs with PendingSlash, PendingSlashStatus (4 variants), AppealAttempt, AppealOutcome (3 variants), PendingSlashBook (new/insert/get/get_mut/remove/len/capacity/expired_by — the last two support future DSL-146/147). Manager gains book + processed fields + with_book_capacity constructor + is_processed/processed_epoch accessors. submit_evidence final step inserts PendingSlash { status: Accepted, submitted_at_epoch: current_epoch, window_expires_at_epoch: current_epoch + SLASH_APPEAL_WINDOW_EPOCHS (8), base_slash_per_validator clone, reporter_bond_mojos: REPORTER_BOND_MOJOS, appeal_history: [] } AND registers evidence.hash() in processed. SlashingResult.pending_slash_hash populated. New constants: SLASH_APPEAL_WINDOW_EPOCHS=8, MAX_PENDING_SLASHES=4_096. New SlashingError variant: PendingBookFull (DSL-027 uses it next). 9-test suite: status Accepted, window epochs (100+8=108), per_validator vec cardinality + equality with result, reporter_bond_mojos constant, appeal_history empty, processed map updated (is_processed/processed_epoch), result.pending_slash_hash==evidence.hash(), determinism across two managers, book.len grows by 1."

  - id: DSL-025
    section: "Optimistic Admission"
    summary: "submit_evidence routes wb_reward to reporter and prop_reward to block proposer"
    status: verified
    spec_ref: "docs/requirements/domains/lifecycle/specs/DSL-025.md"
    catalogue_ref: "docs/resources/SPEC.md#dsl-025"
    tests:
      - dsl_025_submit_evidence_reward_routing_test
    notes: "Reward routing landed in src/manager.rs: wb_reward = total_eff/512 routed to reporter_puzzle_hash, prop_reward = wb_reward/8 routed to block-proposer puzzle hash via ProposerView::proposer_at_slot(current_slot). burn = total_base - wb - prop. New traits in src/traits.rs: RewardPayout, RewardClawback, ProposerView. New constants: WHISTLEBLOWER_REWARD_QUOTIENT=512, PROPOSER_REWARD_QUOTIENT=8. New SlashingError variant: ProposerUnavailable. submit_evidence signature extended with reward_payout + proposer params (clippy too_many_arguments allowed). 9-test suite: happy path amounts, reporter PH target, proposer PH target, burn accounting, multi-validator totals, zero rewards still emit two pay(0) calls, proposer lookup uses current_slot, determinism, ProposerUnavailable error. DSL-022/023/024 fixtures patched with NullReward + FixedProposer stubs + inject_proposer helper."

  - id: DSL-026
    section: "Optimistic Admission"
    summary: "submit_evidence rejects AlreadySlashed on duplicate evidence_hash"
    status: verified
    spec_ref: "docs/requirements/domains/lifecycle/specs/DSL-026.md"
    catalogue_ref: "docs/resources/SPEC.md#dsl-026"
    tests:
      - dsl_026_submit_evidence_already_slashed_test
    notes: "Dedup check runs as FIRST statement in submit_evidence — before verify_evidence, bond lock, slash_absolute, reward.pay, book.insert. Returns SlashingError::AlreadySlashed. No state mutation on duplicate path. New SlashingError variant: AlreadySlashed. 7-test suite with RecordingBond + RecordingReward + slash_call counters: duplicate rejected, no state mutation on dup (bond/reward/slash/book counts unchanged), dedup precedes verify (corrupted dup still surfaces AlreadySlashed), is_processed helper returns true post-admit, distinct evidences admitted independently (different hashes), duplicate no bond lock, duplicate no reward pay."

  - id: DSL-027
    section: "Optimistic Admission"
    summary: "submit_evidence rejects PendingBookFull at MAX_PENDING_SLASHES capacity"
    status: verified
    spec_ref: "docs/requirements/domains/lifecycle/specs/DSL-027.md"
    catalogue_ref: "docs/resources/SPEC.md#dsl-027"
    tests:
      - dsl_027_submit_evidence_book_full_test
    notes: "Capacity check inserted in submit_evidence AFTER verify_evidence + dedup (DSL-026) but BEFORE bond.lock / slash / reward / book.insert. Predicate book.len() >= book.capacity() returns Err(PendingBookFull). 7-test suite uses SlashingManager::with_book_capacity(n) with tiny capacities (1, 2): submit succeeds at capacity-1, rejected at capacity, no bond lock on rejection, no validator mutation, no processed-map write (retry permitted), no reward pay, verify runs before capacity check (OffenseTooOld surfaces even at capacity)."

  - id: DSL-028
    section: "Optimistic Admission"
    summary: "submit_evidence rejects BondLockFailed on insufficient reporter stake"
    status: verified
    spec_ref: "docs/requirements/domains/lifecycle/specs/DSL-028.md"
    catalogue_ref: "docs/resources/SPEC.md#dsl-028"
    tests:
      - dsl_028_submit_evidence_bond_lock_failed_test
    notes: "BondError → BondLockFailed mapping enforced in submit_evidence (landed with DSL-023 commit). 8-test suite with ToggleBond mock (runtime-configurable verdict + flip_to_accepting): InsufficientBalance → BondLockFailed, no slash_absolute on rejection, no reward.pay, no pending insert (book.len==0 + get(hash)==None), processed NOT set (retry permitted), retry after flipping mock to accepting succeeds, error variant exact equality, DoubleLock also maps to BondLockFailed (coarse mapping documented)."

  - id: DSL-029
    section: "Finalisation"
    summary: "finalise_expired_slashes transitions Accepted/ChallengeOpen to Finalised after window"
    status: verified
    spec_ref: "docs/requirements/domains/lifecycle/specs/DSL-029.md"
    catalogue_ref: "docs/resources/SPEC.md#dsl-029"
    tests:
      - dsl_029_finalise_transitions_to_finalised_test
    notes: "SlashingManager::finalise_expired_slashes(&mut self) -> Vec<FinalisationResult> added to src/manager.rs. Iterates book.expired_by(current_epoch) in ascending window-expiry order, skips Reverted/Finalised (DSL-033), transitions Accepted/ChallengeOpen to Finalised { finalised_at_epoch: current_epoch } with one FinalisationResult per transition. Side-effect fields (per_validator_correlation_penalty, reporter_bond_returned, exit_lock_until_epoch) stay default-zero/empty until DSL-030/031/032 ship. New FinalisationResult struct (SPEC §3.9). New SlashingManager::set_epoch test helper. 7-test suite: Accepted→Finalised at epoch 9 (window=8), ChallengeOpen covered via same match arm, FinalisationResult.evidence_hash matches, idempotent (second call empty vec), empty-book returns empty, 3 distinct admissions in deterministic ascending order, not-yet-expired pending untouched (stays Accepted)."

  - id: DSL-030
    section: "Finalisation"
    summary: "finalise_expired_slashes applies correlation penalty eff_bal * min(cohort*3, total) / total"
    status: verified
    spec_ref: "docs/requirements/domains/lifecycle/specs/DSL-030.md"
    catalogue_ref: "docs/resources/SPEC.md#dsl-030"
    tests:
      - dsl_030_finalise_applies_correlation_penalty_test
    notes: "Correlation penalty formula in finalise_expired_slashes. SlashingManager gains slashed_in_window BTreeMap<(slash_epoch, validator_index), eff_bal_at_slash>; submit_evidence inserts one entry per per-validator debit (DSL-022 extension). Finalise computes cohort_sum over [current - CORRELATION_WINDOW_EPOCHS, current] range, then per validator: penalty = u128(eff_bal) * u128(min(cohort*3, total_active)) / u128(total_active). u128 intermediate prevents overflow (eff_bal * capped can exceed u64::MAX at MIN_EFFECTIVE_BALANCE magnitudes). total_active==0 → 0 (defensive). Penalty applied via slash_absolute(penalty, current_epoch); recorded in FinalisationResult.per_validator_correlation_penalty. finalise_expired_slashes signature extended: (validator_set, effective_balances, total_active_balance). New constant PROPORTIONAL_SLASHING_MULTIPLIER=3. 8-test suite: isolated slash small penalty (eff²*3/total), saturation at eff_bal when cohort*3>=total, window bounds exclude pre-window admissions, multiplier=3 (cohort=total/6 → penalty=eff/2), recorded in result + slash_absolute called at finalise epoch, zero cohort → zero penalty, zero total_active → zero, determinism across managers. DSL-029 test updated for new signature."

