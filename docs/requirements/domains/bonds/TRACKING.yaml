items:
  - id: DSL-121
    section: "BondEscrow Trait"
    summary: "BondEscrow::lock InsufficientBalance"
    status: verified
    spec_ref: "docs/requirements/domains/bonds/specs/DSL-121.md"
    catalogue_ref: "docs/resources/SPEC.md#dsl-121"
    tests:
      - dsl_121_bond_lock_insufficient_balance_test
    notes: "Opens Phase 7 Bonds. Trait surface already defined in src/bonds.rs; DSL-121 pins the contract via a reference MockBondEscrow in the test file — HashMap-backed free balance + (principal,tag)→amount escrow map. 3-test suite: sufficient balance Ok + distinct tag slots independent; InsufficientBalance { have, need } carries exact values + escrow unchanged on failure; DoubleLock { tag } carries offending tag + preserves prior state. Mock prioritises DoubleLock over InsufficientBalance (structural invariant over transient balance state)."

  - id: DSL-122
    section: "BondEscrow Trait"
    summary: "BondEscrow::forfeit returns mojos"
    status: verified
    spec_ref: "docs/requirements/domains/bonds/specs/DSL-122.md"
    catalogue_ref: "docs/resources/SPEC.md#dsl-122"
    tests:
      - dsl_122_bond_forfeit_returns_mojos_test
    notes: "Pins forfeit contract via reference MockBondEscrow. Return value = full escrowed amount (critical — only channel carrying forfeited mojos to DSL-068/071 winner-award + burn split). Tag zeroed post-forfeit; unknown-tag + double-forfeit both return BondError::TagNotFound { tag }. 4-test suite includes a pin that `amount` parameter is currently ignored for return value (future partial-forfeit extensions must not silently regress DSL-068/071 callsites)."

  - id: DSL-123
    section: "BondEscrow Trait"
    summary: "BondEscrow::release full"
    status: verified
    spec_ref: "docs/requirements/domains/bonds/specs/DSL-123.md"
    catalogue_ref: "docs/resources/SPEC.md#dsl-123"
    tests:
      - dsl_123_bond_release_full_on_finalise_test
    notes: "Pins release contract via reference MockBondEscrow with explicit free-balance tracking. Full-release semantics symmetric with DSL-122 forfeit: returns ENTIRE escrowed amount to free stake regardless of `amount` parameter. 4-test suite: lock+release restores free balance, tag zeroed post-release, unknown-tag TagNotFound, double-release TagNotFound + NO double-credit. Called by DSL-031 finalise_expired_slashes when challenge window closes with no winning appeal."

  - id: DSL-124
    section: "Bond Sizes"
    summary: "REPORTER_BOND_MOJOS = MIN_EFFECTIVE_BALANCE / 64"
    status: verified
    spec_ref: "docs/requirements/domains/bonds/specs/DSL-124.md"
    catalogue_ref: "docs/resources/SPEC.md#dsl-124"
    tests:
      - dsl_124_bond_reporter_size_test
    notes: "Dedicated constant-pin test. Constants already defined in src/constants.rs; DSL-023 exercises submit_evidence lock call separately. 4-test suite: exact value + numeric pin (500_000_000 mojos = 0.5 DIG out of 32 DIG min), exact-divides no-truncation invariant (MIN % 64 == 0 AND MIN/64*64 == MIN), compile-time const assertion via const block (any runtime-cell refactor fails to compile), symmetry pin with APPELLANT_BOND_MOJOS (DSL-125 partner)."

