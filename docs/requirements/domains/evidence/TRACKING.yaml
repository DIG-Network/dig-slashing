  - id: DSL-010
    section: "Types"
    summary: "SlashingEvidence::slashable_validators returns 1 for Proposer/InvalidBlock, N for Attester"
    status: verified
    spec_ref: "docs/requirements/domains/evidence/specs/DSL-010.md"
    catalogue_ref: "docs/resources/SPEC.md#22.1"
    tests:
      - dsl_010_slashable_validators_list_test
    notes: "slashable_validators() in src/evidence/envelope.rs. Proposer/InvalidBlock → [proposer_index], Attester delegates to AttesterSlashing::slashable_indices (DSL-007). 6-test suite: Proposer cardinality-1, InvalidBlock cardinality-1, Attester non-empty intersection + parity with helper, disjoint empty, determinism across all 3 variants, strictly-ascending invariant."

  - id: DSL-011
    section: "Verification"
    summary: "verify_evidence rejects OffenseTooOld when evidence.epoch + SLASH_LOOKBACK_EPOCHS < current_epoch"
    status: verified
    spec_ref: "docs/requirements/domains/evidence/specs/DSL-011.md"
    catalogue_ref: "docs/resources/SPEC.md#22.2"
    tests:
      - dsl_011_verify_evidence_offense_too_old_test
    notes: "verify_evidence() in src/evidence/verify.rs. OffenseTooOld check uses saturating_add on LHS (evidence.epoch + SLASH_LOOKBACK_EPOCHS) to avoid underflow when current_epoch=0 and overflow on huge offense_epoch. SLASH_LOOKBACK_EPOCHS re-exported from dig-epoch (1_000). Added ValidatorView + ValidatorEntry traits in src/traits.rs (stubs for DSL-131..136); dig-epoch dep added. Remaining precondition branches (DSL-012..021) land in future commits — current placeholder accept after the lookback check. 6-test suite: at-boundary accepted, beyond-boundary rejected, error fields carry inputs, current=0 no underflow + saturating_add guard, constant re-export parity with dig_epoch, same-epoch accepted."

  - id: DSL-012
    section: "Verification"
    summary: "verify_evidence rejects ReporterIsAccused when reporter_index in slashable_validators"
    status: verified
    spec_ref: "docs/requirements/domains/evidence/specs/DSL-012.md"
    catalogue_ref: "docs/resources/SPEC.md#22.2"
    tests:
      - dsl_012_verify_evidence_reporter_is_accused_test
    notes: "Extends verify_evidence in src/evidence/verify.rs: after OffenseTooOld (DSL-011), rejects when reporter_validator_index appears in slashable_validators() (DSL-010). Payload-agnostic via envelope helper — covers Proposer, Attester (intersection), and InvalidBlock. SlashingError::ReporterIsAccused(u32) added. 7-test suite: Proposer self-accuse, Attester in-intersection rejection, Attester one-side-only passes, InvalidBlock self-accuse, error carries index, ordering invariant (OffenseTooOld surfaces before ReporterIsAccused)."

  - id: DSL-013
    section: "Verification"
    summary: "verify_proposer_slashing enforces same-slot/same-proposer/different-root/valid-sigs/active"
    status: verified
    spec_ref: "docs/requirements/domains/evidence/specs/DSL-013.md"
    catalogue_ref: "docs/resources/SPEC.md#22.2"
    tests:
      - dsl_013_verify_proposer_slashing_preconditions_test
    notes: "verify_proposer_slashing() in src/evidence/verify.rs. Six preconditions in order: same slot (header.height), same proposer_index, distinct header hashes, 96-byte G2 decode for both sigs, proposer registered+not-slashed+active at header.epoch, both BLS verify under chia_bls::verify over block_signing_message. Helper block_signing_message() defined locally (SPEC names dig_block::block_signing_message but upstream 0.1 does not yet export it) — layout: DOMAIN_BEACON_PROPOSER || network_id || LE(epoch) || header_hash || LE(proposer_index), 98 bytes. New SlashingError variants: InvalidProposerSlashing(String), ValidatorNotRegistered(u32). verify_evidence dispatcher now routes Proposer through this verifier; Attester/InvalidBlock remain placeholder-accept pending DSL-014..020. DSL-011 + DSL-012 tests updated to use Attester payload for placeholder-success paths. 12-test suite: happy path, slot mismatch, proposer mismatch, identical headers, bad sig width, unregistered validator, already-slashed, inactive validator, bad sig A / B BLS verify, signing-message layout parity, direct-vs-dispatch call parity."

  - id: DSL-014
    section: "Verification"
    summary: "verify_attester_slashing accepts double-vote (same target, different data)"
    status: verified
    spec_ref: "docs/requirements/domains/evidence/specs/DSL-014.md"
    catalogue_ref: "docs/resources/SPEC.md#22.2"
    tests:
      - dsl_014_verify_attester_double_vote_predicate_test
    notes: "verify_attester_slashing() in src/evidence/verify.rs implements full attester pipeline (structure check via DSL-005, byte-identical rejection, double-vote OR surround-vote predicate, empty-intersection rejection, BLS aggregate verify via DSL-006). Predicate: a.target.epoch == b.target.epoch AND a.data != b.data. ValidatorViewPubkeys adapter bridges ValidatorView to PublicKeyLookup without duplicating DSL-006 BLS code. New SlashingError variants: InvalidAttesterSlashing(String), AttesterSlashingNotSlashable, EmptySlashableIntersection. 6-test suite (DSL-014 only): valid double-vote accepted, different targets + no surround → AttesterSlashingNotSlashable, byte-identical rejected, direct chia_bls aggregate_verify parity, slashable_validator_indices == DSL-007 intersection, direct verify_attester_slashing call parity with dispatch. DSL-015/016/017 tests land as separate commits. DSL-011 + DSL-012 fixtures switched to InvalidBlock payload (still placeholder-accept) for their dispatcher-precondition tests."

  - id: DSL-015
    section: "Verification"
    summary: "verify_attester_slashing accepts surround-vote (a.src < b.src AND a.tgt > b.tgt)"
    status: verified
    spec_ref: "docs/requirements/domains/evidence/specs/DSL-015.md"
    catalogue_ref: "docs/resources/SPEC.md#22.2"
    tests:
      - dsl_015_verify_attester_surround_vote_predicate_test
    notes: "Surround-vote predicate enforced in verify_attester_slashing (landed with DSL-014 commit). Strict inequalities: (a.src < b.src AND a.tgt > b.tgt) OR mirror. 7-test suite: a surrounds b, b surrounds a (mirror), non-overlapping → AttesterSlashingNotSlashable, equal source → not surround (rejected when no double-vote either), equal target → still accepted via double-vote (documents strictness), adjacent shared target → same, slashable-set matches DSL-007 intersection."

  - id: DSL-016
    section: "Verification"
    summary: "verify_attester_slashing rejects EmptySlashableIntersection"
    status: verified
    spec_ref: "docs/requirements/domains/evidence/specs/DSL-016.md"
    catalogue_ref: "docs/resources/SPEC.md#22.2"
    tests:
      - dsl_016_verify_attester_empty_intersection_test
    notes: "EmptySlashableIntersection check enforced in verify_attester_slashing (landed with DSL-014 commit). Ordering: after structure + byte-identical + predicate; before BLS aggregate verify — bounds DoS cost on disjoint-committee evidence. 5-test suite: disjoint rejected, non-empty passes, bad-sig + disjoint → EmptySlashableIntersection beats BlsVerifyFailed (ordering invariant vs BLS), single-element intersection passes (boundary), disjoint + neither-predicate → AttesterSlashingNotSlashable wins (predicate runs first, ordering invariant vs predicate decision)."

  - id: DSL-017
    section: "Verification"
    summary: "verify_attester_slashing rejects AttesterSlashingNotSlashable (neither predicate)"
    status: verified
    spec_ref: "docs/requirements/domains/evidence/specs/DSL-017.md"
    catalogue_ref: "docs/resources/SPEC.md#22.2"
    tests:
      - dsl_017_verify_attester_not_slashable_test
    notes: "AttesterSlashingNotSlashable enforced in verify_attester_slashing (landed with DSL-014 commit). 6-test suite: non-overlapping windows rejected, byte-identical surfaces InvalidAttesterSlashing not this variant (ordering: identical-check before predicate), genuine double-vote passes, genuine surround passes, equal-source non-surround non-double-vote rejected, nested-but-not-strict (same source, smaller target) rejected — documents strict inequalities."

  - id: DSL-018
    section: "Verification"
    summary: "verify_invalid_block enforces signature over dig_block::block_signing_message"
    status: verified
    spec_ref: "docs/requirements/domains/evidence/specs/DSL-018.md"
    catalogue_ref: "docs/resources/SPEC.md#22.2"
    tests:
      - dsl_018_verify_invalid_block_signature_over_domain_test
    notes: "verify_invalid_block() in src/evidence/verify.rs implements full pipeline covering DSL-018..020 paths (epoch match, witness size, sig decode, validator lookup + active + not-slashed, BLS verify over block_signing_message, optional oracle). Shared block_signing_message helper with DSL-013 — same DOMAIN_BEACON_PROPOSER prefix so proposer-equivocation and invalid-block signatures are produced under a single domain. New SlashingError variant: InvalidSlashingEvidence(String). Traits: ExecutionOutcome enum + InvalidBlockOracle trait (default verify_failure = Ok bootstrap mode) in src/traits.rs. MAX_SLASH_PROPOSAL_PAYLOAD_BYTES = 65_536 added. Dispatcher routes InvalidBlock through this verifier with oracle=None by default; direct call allows oracle=Some. 7-test suite (DSL-018 only): valid sig accepted, raw-hash (no domain) rejected, wrong-key rejected, cross-network replay rejected, signing-message layout parity with helper, direct call ≡ dispatch, bad sig width rejected. DSL-019/020 tests land as separate commits. DSL-011/DSL-012 fixtures relaxed to match on error variant (accept ANY downstream error except the DSL under test)."

  - id: DSL-019
    section: "Verification"
    summary: "verify_invalid_block rejects when header.epoch != evidence.epoch"
    status: verified
    spec_ref: "docs/requirements/domains/evidence/specs/DSL-019.md"
    catalogue_ref: "docs/resources/SPEC.md#22.2"
    tests:
      - dsl_019_verify_invalid_block_epoch_mismatch_test
    notes: "Epoch-mismatch check enforced in verify_invalid_block (landed with DSL-018 commit). Runs FIRST — cheapest filter before witness size, sig decode, or BLS pairing. 5-test suite: matching epochs pass, mismatch rejected as InvalidSlashingEvidence('epoch mismatch: header=... envelope=...'), error carries both epoch values, ordering invariant vs BLS (mismatch + corrupt sig → epoch error wins), symmetric predicate (header>envelope AND header<envelope both reject)."

  - id: DSL-020
    section: "Verification"
    summary: "verify_invalid_block calls InvalidBlockOracle::verify_failure when oracle supplied"
    status: verified
    spec_ref: "docs/requirements/domains/evidence/specs/DSL-020.md"
    catalogue_ref: "docs/resources/SPEC.md#22.2"
    tests:
      - dsl_020_verify_invalid_block_oracle_called_test
    notes: "Oracle hook enforced in verify_invalid_block (landed with DSL-018 commit). Signature: oracle: Option<&dyn InvalidBlockOracle> — None (dispatcher default) = bootstrap mode. 6-test suite: RecordingOracle records args + verify_failure called exactly once on accept path, oracle Err propagates, None skipped (direct + dispatcher), DefaultOnlyOracle (no verify_failure override) accepts via trait default, oracle receives exact header/witness/reason from payload, ordering invariant vs BLS (bad sig → oracle never called)."

  - id: DSL-021
    section: "Verification"
    summary: "verify_evidence_for_inclusion parity with verify_evidence minus state mutation"
    status: verified
    spec_ref: "docs/requirements/domains/evidence/specs/DSL-021.md"
    catalogue_ref: "docs/resources/SPEC.md#22.2"
    tests:
      - dsl_021_verify_evidence_for_inclusion_parity_test
    notes: "verify_evidence_for_inclusion() in src/evidence/verify.rs. Today delegates directly to verify_evidence — current verifier chain performs NO state mutation (walks &dyn ValidatorView only). Separation is API-contract: mempool (dig-mempool, DSL-106) holds &dyn ValidatorView by type so future processed-map dedup / state-mutating additions in verify_evidence cannot leak into the mempool path. 7-test suite: happy-path parity, OffenseTooOld parity, ReporterIsAccused parity, BLS-fail parity, Attester parity, InvalidBlock parity, shared-borrow compile-time check (two consecutive calls through same &dyn view)."

